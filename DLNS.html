<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Draft Stats</title><style>
:root{
--bg:#07111f;
--p:#0d1b2e;
--p2:#091525;
--b:#20314a;
--t:#e7eef9;
--m:#9fb0c8;
--m2:#6f819c;
--a:#7dd3fc;
--bad:#fca5a5;
--good:#86efac;
--chip:#17263c}
*{
box-sizing:border-box}
body{
margin:0;
background:radial-gradient(circle at top left,rgba(125,211,252,.14),transparent 34rem),var(--bg);
color:var(--t);
font-family:Inter,system-ui,"Segoe UI",sans-serif}
.wrap{
width:min(1500px,calc(100vw - 28px));
margin:auto;
padding:24px 0 44px}
h1{
margin:0;
font-size:clamp(30px,4vw,52px);
letter-spacing:-.05em}
.muted,.small{
color:var(--m);
font-size:13px}
.card{
background:rgba(13,27,46,.86);
border:1px solid var(--b);
border-radius:18px}
.in{
padding:13px}
.grid{
display:grid;
gap:12px}
.g5{
grid-template-columns:repeat(5,1fr)}
.top{
grid-template-columns:1fr 220px;
margin:14px 0}
.tabs{
display:flex;
flex-wrap:wrap;
gap:6px;
margin:0 0 14px;
padding:4px;
background:rgba(9,21,37,.72);
border:1px solid var(--b);
border-radius:18px;
width:max-content;
max-width:100%}
button{
border:0;
border-radius:10px;
padding:7px 11px;
background:var(--a);
color:#04111f;
font-weight:800;
cursor:pointer}
.tab{
background:transparent;
color:var(--m)}
.tab.active{
background:var(--a);
color:#04111f}
.label{
color:var(--m);
font-size:12px}
.value{
font-size:21px;
font-weight:800}
.mono{
font-variant-numeric:tabular-nums}
.bar{
display:flex;
justify-content:space-between;
gap:10px;
align-items:center;
flex-wrap:wrap;
margin-bottom:10px}
.title{
font-weight:850;
font-size:16px}
.pill{
border:1px solid var(--b);
background:var(--p2);
color:var(--m);
border-radius:999px;
padding:5px 8px;
font-size:12px}
.chip{
border:1px solid var(--b);
background:var(--p2);
color:var(--m);
border-radius:8px;
padding:3px 6px;
font-size:12px}
.hidden{
display:none!important}
input,select,textarea{
width:100%;
background:var(--p2);
border:1px solid var(--b);
color:var(--t);
border-radius:10px;
padding:7px 9px;
font-size:13px}
textarea{
min-height:54px;
resize:vertical}
.stack{
display:grid;
gap:10px}
.layout{
display:grid;
grid-template-columns:300px 1fr;
gap:12px}
.searchLayout{
display:grid;
grid-template-columns:250px 1fr;
gap:12px}
.table{
border:1px solid var(--b);
border-radius:14px;
overflow:auto}
.head,.r{
display:grid;
gap:9px;
align-items:center;
padding:8px 10px}
.head{
background:var(--p2);
color:var(--m2);
font-size:11px;
font-weight:850;
text-transform:uppercase;
letter-spacing:.08em}
.r{
border-top:1px solid var(--b);
color:var(--m);
font-size:13px}
.r b{
color:var(--t)}
.match{
grid-template-columns:130px 65px 1fr 70px 115px 1.4fr}
.draft{
grid-template-columns:70px minmax(280px,1.25fr) 110px 1fr;
align-items:start}
.duo,.trio,.quint{
grid-template-columns:80px minmax(240px,1.25fr) minmax(220px,1fr) repeat(3,minmax(115px,.6fr));
min-width:900px}
.duo>div:nth-child(2),.trio>div:nth-child(2),.quint>div:nth-child(2){
justify-self:center;
text-align:center}
.seen{
background:rgba(125,211,252,.08);
color:#c7d9f2}
.heroStat{
grid-template-columns:58px 160px 68px 68px 78px 68px 68px 72px 100px 145px 80px;
min-width:1015px}
.playerStat{
grid-template-columns:165px 48px 65px 58px 58px 58px 68px 92px 285px 185px 70px;
min-width:1210px}
.roster{
grid-template-columns:50px 55px 130px 115px 1fr 1fr;
align-items:start}
.heroes,.pool{
display:flex;
flex-wrap:wrap;
gap:9px;
align-items:center;
justify-content:center}
.match .heroes,.draft .heroes{
justify-content:flex-start}
.score{
font-size:22px;
font-weight:900}
.miniScores{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
margin-top:7px}
.mini{
background:var(--p2);
border-radius:8px;
padding:3px 5px;
text-align:center;
font-size:10px;
color:var(--m)}
.mini b{
display:block;
color:var(--t);
font-size:11px}
.slots{
display:grid;
gap:8px}
.slot{
background:var(--p2);
border:1px solid var(--b);
border-radius:12px;
padding:7px}
.iconBox{
width:40px;
height:40px;
border-radius:10px;
background:rgba(255,255,255,.04);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:6px;
overflow:hidden}
.iconBox img{
width:100%;
height:100%;
object-fit:cover}
.mIcon{
width:34px;
height:34px}
.dIcon{
width:38px;
height:38px}
.sIcon{
width:18px;
height:18px}
.hIcon{
width:38px;
height:38px}
.mIcon,.dIcon,.sIcon,.hIcon{
border-radius:8px;
object-fit:cover;
background:var(--chip);
border:1px solid rgba(255,255,255,.08)}
.badge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:24px;
height:20px;
padding:0 6px;
margin-right:7px;
border-radius:7px;
background:var(--chip);
border:1px solid rgba(255,255,255,.08);
color:var(--t);
font-size:12px;
font-weight:850}
.chip{
display:inline-flex;
align-items:center;
gap:4px}
.current{
color:var(--good);
border-color:rgba(134,239,172,.35);
background:rgba(22,101,52,.16);
font-weight:850}
.history,.compare{
display:flex;
flex-direction:column;
gap:4px;
align-items:flex-start}
.rosterSlot{
min-height:24px;
display:flex;
align-items:center;
width:100%;
padding:2px 6px;
border-radius:7px;
background:rgba(23,38,60,.55);
border:1px solid rgba(255,255,255,.06);
color:var(--t)}
.rosterSlot.empty{
opacity:.35;
color:var(--m2)}
.rosterSlot.added{
color:var(--good);
border-color:rgba(134,239,172,.35);
background:rgba(22,101,52,.16)}
.rosterSlot.removed{
color:var(--bad);
border-color:rgba(252,165,165,.35);
background:rgba(127,29,29,.18)}
.rosterSlot.first{
color:var(--a);
border-color:rgba(125,211,252,.42);
background:rgba(14,116,144,.18);
font-weight:850}
.nPlayer{
font-weight:850}
.nPlayer.added{
color:#86efac}
.nPlayer.removed{
color:#fda4af}
.nPlayer.first{
color:#7dd3fc}
.nPlayer.temp{
color:#facc15}
.sign{
display:inline-flex;
align-items:center;
justify-content:center;
width:16px;
height:16px;
margin-right:5px;
border-radius:5px;
font-weight:900;
color:#04111f}
.add{
background:var(--good)}
.remove{
background:var(--bad)}
.week{
padding:10px 12px;
background:var(--p2);
border-top:1px solid var(--b);
font-weight:900}
.searchText{
position:absolute;
width:1px;
height:1px;
padding:0;
margin:-1px;
overflow:hidden;
clip:rect(0 0 0 0);
clip-path:inset(50%);
white-space:nowrap}
.iw{
display:inline-flex;
position:relative}
.sort{
background:transparent;
color:inherit;
border:0;
padding:0;
text-align:left;
text-transform:inherit;
letter-spacing:inherit;
font-size:inherit;
font-weight:inherit;
display:inline-flex;
align-items:center;
gap:5px}
.sort.sorted::after{
content:'';
display:inline-block;
width:0;
height:0;
border-left:4px solid transparent;
border-right:4px solid transparent;
opacity:.9}
.sort.sorted.asc::after{
border-bottom:6px solid currentColor}
.sort.sorted.desc::after{
border-top:6px solid currentColor}
.bigStats{
display:flex;
gap:10px;
flex-wrap:wrap}
.bigStat{
min-width:118px;
background:rgba(125,211,252,.08);
border:1px solid var(--b);
border-radius:14px;
padding:9px 12px}
.bigStat .n{
font-size:22px;
font-weight:900;
color:var(--t);
line-height:1}
.bigStat .l{
font-size:11px;
color:var(--m2);
text-transform:uppercase;
letter-spacing:.08em;
margin-top:4px}
.error{
color:var(--bad);
background:rgba(127,29,29,.28);
border:1px solid rgba(252,165,165,.26);
padding:10px;
border-radius:12px}
@media(max-width:1050px){
.layout,.searchLayout{
grid-template-columns:1fr}
.g5{
grid-template-columns:repeat(2,1fr)}
.head:not(.duo):not(.trio):not(.quint):not(.playerStat):not(.heroStat){
display:none}
.r:not(.duo):not(.trio):not(.quint):not(.playerStat):not(.heroStat){
grid-template-columns:1fr!important}
.slots{
grid-template-columns:repeat(3,1fr)}
}
@media(max-width:620px){
.g5,.slots{
grid-template-columns:1fr}
}
</style>
</head>
