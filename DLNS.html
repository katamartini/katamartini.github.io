(function(){const META_ID='metanarrative';function addMetaUI(){if($(META_ID+'Results'))return;const i=TABS.indexOf('rostermoves');if(!TABS.includes(META_ID))TABS.splice(i<0?TABS.length:i,0,META_ID);const btn=document.createElement('button');btn.className='tab';btn.id='tabBtn-'+META_ID;btn.textContent='Meta Narrative';btn.onclick=()=>setTab(META_ID);$('tabs').insertBefore(btn,$('tabBtn-rostermoves')||null);$('panels').insertAdjacentHTML('beforeend','<section id="tab-'+META_ID+'" class="tab-panel hidden"><section class="card"><div class="in"><div class="title">Meta narrative</div><div class="muted" style="margin-bottom:10px">Weekly hero priority by early picks and bans. Consecutive same-team pick pairs share priority; pick 6, bans 3/4, and pick 7 are ordered separately.</div><div class="table"><div class="head meta"><div>Week</div><div>Top priority</div><div>Risers</div><div>Fallers</div></div><div id="'+META_ID+'Results"></div></div></div></section></section>')}function pickPoints(n){return {1:7,2:6,3:6,4:5,5:5,6:4,7:3,8:2,9:2,10:1,11:1,12:.5}[n]||0}function banPoints(n){return {1:7,2:6,3:3.5,4:3.5}[n]||0}function points(r){const type=(r.type||'').toLowerCase(),n=Number(r.order);if(!Number.isFinite(n))return 0;if(type==='ban')return banPoints(n);if(type==='pick')return pickPoints(n);return 0}function weeklyMeta(){const weeks=new Map();for(const r of records){const hero=r.hero,week=r.week||'-',p=points(r);if(!hero||!p)continue;if(!weeks.has(week))weeks.set(week,{week,heroes:new Map(),total:0});const w=weeks.get(week),old=w.heroes.get(hero)||{hero,score:0,count:0,pct:0};old.score+=p;old.count++;w.heroes.set(hero,old);w.total+=p}const rows=[...weeks.values()].sort((a,b)=>wv(a.week)-wv(b.week));rows.forEach(w=>w.list=[...w.heroes.values()].map(x=>({...x,pct:w.total?x.score/w.total*100:0})).sort((a,b)=>b.score-a.score||a.hero.localeCompare(b.hero)));return rows}function byHero(row){const m=new Map();(row?.list||[]).forEach(x=>m.set(x.hero,x));return m}function movers(cur,
