function recompute(){const built=groupDrafts(true);renderRegions(built.regions);const heroes=[...new Set([...built.heroes,...lst($('manualHeroes').value)])].sort((a,b)=>a.localeCompare(b));currentHeroUniverse=heroes;currentAllDrafts=groupDrafts(false).drafts;const maps=countMaps(built.drafts),possible=nCk(heroes.length,6),w={heroes:+$('wHeroes').value||0,duos:+$('wDuos').value||0,trios:+$('wTrios').value||0,quads:+$('wQuads').value||0,fives:+$('wFives').value||0};renderHeroStats(currentAllDrafts);renderPlayerStats(currentAllDrafts);renderRosterMoves(currentAllDrafts);renderRosterNarrative(currentAllDrafts);renderDraftSearch(heroes);renderDuos(heroes,maps);renderTrios(heroes,maps);Object.entries({rawRows:records.length,teamDrafts:built.drafts.length,heroUniverse:heroes.length,seenSixes:maps.sixes.size,possibleSixes:possible,uniqueHeroes:maps.heroes.size,uniqueDuos:maps.duos.size,uniqueTrios:maps.trios.size,uniqueQuads:maps.quads.size,uniqueFives:maps.fives.size}).forEach(([id,v])=>$(id).textContent=num(v));$('coverage').textContent=possible?(maps.sixes.size/possible*100).toFixed(3)+'%':'0.000%';renderResults(heroes.length<6?[]:likelyUnseen(heroes,maps,w))}
function sched(){clearTimeout(rt);rt=setTimeout(recompute,180)}function schedDraft(){clearTimeout(dt);dt=setTimeout(()=>renderDraftSearch(currentHeroUniverse),80)}function useCache(){try{const text=localStorage.getItem(CACHE),at=+localStorage.getItem(CACHE_T);if(!text||!at)return false;records=objs(csv(text));if(!records.length)return false;$('status').textContent='cached';$('sourceNote').textContent='Using cached draft sheet. Reload data to refresh.';recompute();return Date.now()-at<MAX_AGE}catch{return false}}async function loadSheet(force=false){if(!force&&useCache())return;$('status').textContent='loading';$('error').classList.add('hidden');try{const r=await fetch(CSV_URL,{cache:force?'reload':'default'});if(!r.ok)throw Error('Fetch failed: '+r.status);const text=await r.text();records=objs(csv(text));if(!records.length)throw Error('No rows found');try{localStorage.setItem(CACHE,text);localStorage.setItem(CACHE_T,Date.now())}catch{}$('status').textContent='loaded';$('sourceNote').textContent='Using freshly loaded public draft sheet.';recompute()}catch(err){$('status').textContent='error';$('error').textContent=(err.message||err)+'. Make sure the sheet is public.';$('error').classList.remove('hidden')}}function setTab(name){if(!TABS.includes(name))name='search';TABS.forEach(id=>{$('tab-'+id).classList.toggle('hidden',id!==name);$('tabBtn-'+id).classList.toggle('active',id===name)});if(location.hash!=='#'+name)history.replaceState(null,'','#'+name)}function init(){makeUI();$('loadBtn').onclick=()=>loadSheet(true);$('clearSearchBtn').onclick=()=>{for(let i=0;i<6;i++)$('draftHero'+i).value='';schedDraft()};['region','resultFilter','topN','minScore','includeText','excludeText','manualHeroes','duoFilterText','showSeenDuos','trioFilterText','showSeenTrios','wHeroes','wDuos','wTrios','wQuads','wFives'].forEach(id=>{$(id).oninput=sched;$(id).onchange=sched});for(let i=0;i<6;i++){$('draftHero'+i).oninput=schedDraft;$('draftHero'+i).onchange=schedDraft}window.onhashchange=()=>setTab(location.hash.slice(1)||'search');setTab(location.hash.slice(1)||'search');loadSheet()}init();
</script></body></html>
