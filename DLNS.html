function init(){makeUI();test();$('loadBtn').onclick=()=>loadSheet(true);$('clearSearchBtn').onclick=()=>{for(let i=0;i<6;i++)$('draftHero'+i).value='';schedDraft()};['region','resultFilter','topN','minScore','includeText','excludeText','manualHeroes','duoFilterText','showSeenDuos','trioFilterText','showSeenTrios','wHeroes','wDuos','wTrios','wQuads','wFives'].forEach(id=>{$(id).oninput=sched;$(id).onchange=sched});for(let i=0;i<6;i++){$('draftHero'+i).oninput=schedDraft;$('draftHero'+i).onchange=schedDraft}window.onhashchange=()=>setTab(location.hash.slice(1)||'search');setTab(location.hash.slice(1)||'search');loadSheet()}init();
</script></body></html>
