name: Update TV IMDb ratings

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tv-data.json
      - scripts/update-imdb-ratings.mjs
      - .github/workflows/update-tv-ratings.yml
  schedule:
    - cron: "18 9 * * 1"

permissions:
  contents: write

concurrency:
  group: update-tv-imdb-ratings-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-ratings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: node scripts/update-imdb-ratings.mjs

      - name: Commit ratings cache
        run: |
          if git diff --quiet -- tv-ratings.json; then
            echo "No ratings changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tv-ratings.json
          git commit -m "Update TV IMDb ratings"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "Push failed; rebasing on latest main and regenerating ratings (attempt ${attempt})."
            git fetch origin main
            git rebase origin/main
            node scripts/update-imdb-ratings.mjs
            git add tv-ratings.json
            git commit --amend --no-edit
          done

          git push
