<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23252a33'/%3E%3Crect x='12' y='18' width='40' height='28' rx='5' fill='%23fbfcfe'/%3E%3Crect x='16' y='22' width='32' height='20' rx='3' fill='%23286ea8'/%3E%3Cpath d='M24 52h16' stroke='%232f7d58' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M24 13 17 6M40 13l7-7' stroke='%23fbfcfe' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #181b22;
      --muted: #667085;
      --line: #d7dce5;
      --paper: #fbfcfe;
      --wash: #eef2f7;
      --panel: #ffffff;
      --charcoal: #252a33;
      --green: #2f7d58;
      --gold: #b67812;
      --red: #b84d4d;
      --blue: #286ea8;
      --focus: rgba(40, 110, 168, 0.22);
      --shadow: rgba(33, 38, 48, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: #aab4c3;
      background: #f6f8fb;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      background: var(--charcoal);
      color: #ffffff;
      border-bottom: 4px solid var(--green);
    }

    .topbar-inner {
      width: min(1500px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 16px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }

    .summary-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .stat {
      min-width: 92px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      text-align: right;
    }

    .stat b {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: #cbd5e1;
      font-size: 11px;
      text-transform: uppercase;
    }

    .workspace {
      width: min(1500px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 12px 0;
      display: grid;
      gap: 12px;
      align-items: start;
    }

    .detail {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px var(--shadow);
    }

    .section {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 76px;
      gap: 8px;
    }

    .field {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
    }

    .search-results {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      position: absolute;
      z-index: 20;
      top: calc(100% - 1px);
      left: 12px;
      right: 12px;
      padding: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: 0 18px 34px rgba(33, 38, 48, 0.18);
    }

    .search-results[hidden] {
      display: none;
    }

    .search-panel {
      position: relative;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px var(--shadow);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .result {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .result-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: end;
    }

    .thumb,
    .poster,
    .image-placeholder {
      background: var(--wash);
      object-fit: cover;
    }

    .thumb {
      width: 44px;
      height: 62px;
    }

    .result-name,
    .show-name,
    .episode-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .library-tools {
      display: grid;
      gap: 8px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .file-status {
      min-height: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .sync-panel {
      display: grid;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .check-row input {
      width: 16px;
      height: 16px;
    }

    .settings-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px var(--shadow);
    }

    .settings-panel summary {
      min-height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 800;
    }

    .settings-panel summary::marker,
    .settings-panel summary::-webkit-details-marker {
      content: "";
      display: none;
    }

    .settings-panel summary::after {
      content: "+";
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
    }

    .settings-panel[open] summary::after {
      content: "-";
    }

    .settings-content {
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(240px, 0.9fr) minmax(280px, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .settings-group {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--line);
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      min-width: 0;
      padding: 0 6px;
      white-space: nowrap;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented .active,
    .season-tab.active {
      background: var(--charcoal);
      color: #ffffff;
      border-color: var(--charcoal);
    }

    .show-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 8px;
      padding: 12px;
      background: var(--wash);
    }

    .show-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      cursor: pointer;
    }

    .show-card.active {
      border-color: var(--green);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .show-card:hover {
      border-color: #aab4c3;
    }

    .show-card .thumb {
      width: 58px;
      height: 82px;
    }

    .progress-bar {
      height: 7px;
      margin-top: 7px;
      overflow: hidden;
      background: #dfe5ec;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--green);
    }

    .show-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .badge {
      flex: 0 0 auto;
      padding: 2px 6px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .badge.watching {
      color: var(--green);
      border-color: rgba(47, 125, 88, 0.45);
    }

    .badge.paused {
      color: var(--gold);
      border-color: rgba(182, 120, 18, 0.45);
    }

    .badge.finished {
      color: var(--blue);
      border-color: rgba(40, 110, 168, 0.45);
    }

    .empty {
      padding: 22px 14px;
      border: 1px dashed #b8c0cc;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.65);
      text-align: center;
    }

    .detail {
      display: grid;
      min-height: calc(100vh - 100px);
      align-content: start;
    }

    .hero {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      background: linear-gradient(90deg, #ffffff 0%, #f5f7fa 58%, #edf4f0 100%);
      border-bottom: 1px solid var(--line);
    }

    .poster {
      width: 170px;
      aspect-ratio: 2 / 3;
      border: 1px solid var(--line);
    }

    .image-placeholder {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .image-placeholder.thumb {
      object-fit: initial;
    }

    .hero-main {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .hero-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: start;
      min-width: 0;
    }

    .hero-title {
      margin: 0 0 5px;
      font-size: clamp(24px, 3.3vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .danger {
      border-color: rgba(184, 77, 77, 0.45);
      color: var(--red);
    }

    .primary {
      background: var(--green);
      border-color: var(--green);
      color: #ffffff;
    }

    .primary:hover {
      background: #286c4c;
      border-color: #286c4c;
    }

    .overview {
      max-width: 900px;
      margin: 0;
      color: #394150;
      line-height: 1.5;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
    }

    .metric {
      padding: 10px;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .metric b {
      display: block;
      font-size: 21px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .detail-tools {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      background: #ffffff;
    }

    .modebar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
    }

    .view-tabs {
      width: min(300px, 100%);
      grid-template-columns: repeat(3, 1fr);
    }

    .status-row {
      display: grid;
      grid-template-columns: 80px minmax(130px, 180px);
      gap: 8px;
      align-items: center;
    }

    .status-row label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .season-tabs {
      padding: 12px 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      background: #ffffff;
    }

    .season-tab {
      min-width: 46px;
      padding: 0 10px;
    }

    .episode-grid {
      padding: 12px 16px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      background: #ffffff;
    }

    .episode {
      min-height: 88px;
      padding: 10px;
      border: 1px solid var(--line);
      background: #ffffff;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      text-align: left;
    }

    .episode:hover {
      border-color: #9facbd;
    }

    .episode.watched {
      background: #eef8f2;
      border-color: rgba(47, 125, 88, 0.38);
    }

    .episode.future {
      color: #697386;
      background: #f8fafc;
    }

    .episode-num {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--wash);
      font-weight: 800;
    }

    .episode.watched .episode-num {
      background: var(--green);
      border-color: var(--green);
      color: #ffffff;
    }

    .episode-detail {
      min-width: 0;
    }

    .episode-name {
      display: block;
      font-weight: 700;
    }

    .episode-date {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .episode-summary {
      margin-top: 7px;
      color: #485263;
      font-size: 12px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .queue {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: #ffffff;
    }

    .queue-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .queue-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
      letter-spacing: 0;
    }

    .queue-show {
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .queue-show-head {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .queue-show-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .queue-episodes {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }

    .queue-episodes .episode {
      min-height: 76px;
    }

    .all-shows {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: #ffffff;
    }

    .all-shows-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .sort-control {
      display: grid;
      grid-template-columns: auto minmax(190px, 240px);
      gap: 8px;
      align-items: center;
    }

    .list-controls {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .sort-control label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hide-completed-control {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .all-shows-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
      letter-spacing: 0;
    }

    .show-table {
      display: grid;
      gap: 8px;
    }

    .show-row {
      display: grid;
      grid-template-columns: auto 54px minmax(220px, 0.7fr) minmax(320px, 1.3fr) auto;
      gap: 12px;
      align-items: start;
      padding: 10px;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .show-row-pin {
      display: flex;
      align-items: start;
    }

    .show-row .thumb {
      width: 54px;
      height: 76px;
    }

    .show-row-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .show-row-main {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .show-row-mainline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .inline-episodes {
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .inline-episodes .episode {
      flex: 0 0 220px;
      min-height: 70px;
      grid-template-columns: 36px minmax(0, 1fr);
      padding: 8px;
    }

    .inline-episodes .episode-num {
      width: 36px;
      height: 36px;
    }

    .show-row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
    }

    .pin-badge {
      border: 1px solid #c8a24d;
      background: #fff7df;
      color: #7a5200;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: min(520px, calc(100vw - 24px));
      padding: 10px 14px;
      background: var(--charcoal);
      color: #ffffff;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .toast.visible {
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .topbar-inner {
        align-items: start;
        flex-direction: column;
      }

      .summary-strip {
        justify-content: flex-start;
      }

      .workspace {
        width: min(100vw - 16px, 1500px);
      }

      .detail {
        min-height: 0;
      }

      .settings-content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .topbar-inner,
      .workspace {
        width: min(100vw - 16px, 1500px);
      }

      .topbar-inner {
        padding: 12px 0;
      }

      .hero {
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .poster {
        width: 96px;
      }

      .hero-head {
        display: grid;
      }

      .hero-actions {
        justify-content: start;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-tools {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .modebar,
      .queue,
      .all-shows {
        padding: 12px;
      }

      .queue-head,
      .queue-show-head {
        align-items: start;
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .queue-head {
        display: grid;
      }

      .queue-show-head button {
        grid-column: 1 / -1;
      }

      .season-tabs,
      .episode-grid {
        padding-left: 12px;
        padding-right: 12px;
      }

      .episode-grid {
        grid-template-columns: 1fr;
      }

      .queue-episodes {
        grid-template-columns: 1fr;
      }

      .all-shows-head {
        display: grid;
      }

      .list-controls {
        justify-items: stretch;
      }

      .sort-control {
        grid-template-columns: 1fr;
      }

      .show-row {
        grid-template-columns: auto 54px minmax(0, 1fr);
        align-items: start;
      }

      .inline-episodes {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr;
        overflow-x: visible;
      }

      .inline-episodes .episode {
        flex-basis: auto;
      }

      .show-row-actions {
        grid-column: 1 / -1;
        justify-content: start;
      }

      .search-row,
      .tool-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <h1>TV Tracker</h1>
        <div class="summary-strip" id="summaryStrip"></div>
      </div>
    </header>

    <main class="workspace">
      <section class="search-panel" aria-label="Find a show">
        <h2 class="section-title">Find a Show</h2>
        <form class="search-row" id="searchForm">
          <label class="sr-only" for="searchInput">Show name</label>
          <input class="field" id="searchInput" type="search" placeholder="Search TVmaze" autocomplete="off" />
          <button class="primary" type="submit">Search</button>
        </form>
        <div class="search-results" id="searchResults" hidden></div>
      </section>

      <details class="settings-panel">
        <summary>Settings</summary>
        <div class="settings-content">
          <section class="settings-group">
            <h2 class="section-title">Library</h2>
          <div class="library-tools">
            <div class="segmented" role="group" aria-label="Show filter">
              <button type="button" data-library-filter="all" class="active">All</button>
              <button type="button" data-library-filter="active">Active</button>
              <button type="button" data-library-filter="done">Done</button>
            </div>
            <div class="tool-grid">
              <button type="button" id="exportButton">Export</button>
              <button type="button" id="importButton">Import</button>
              <button type="button" id="openFileButton">Open File</button>
              <button type="button" id="saveFileButton">Save File</button>
            </div>
            <div class="file-status" id="fileStatus"></div>
          </div>
          </section>

          <section class="settings-group">
              <h3 class="section-title">Repo Sync</h3>
              <label class="sr-only" for="githubToken">GitHub token</label>
              <input class="field" id="githubToken" type="password" placeholder="GitHub token" autocomplete="off" />
              <div class="tool-grid">
                <button type="button" id="repoLoadButton">Load Repo</button>
                <button type="button" id="repoSaveButton">Save Repo</button>
              </div>
              <label class="check-row">
                <input id="repoAutoSync" type="checkbox" />
                <span>Auto-save to repo</span>
              </label>
              <div class="file-status" id="repoStatus"></div>
            <input class="sr-only" id="importFile" type="file" accept="application/json" />
          </section>
        </div>
      </details>

      <section class="detail" id="detail" aria-live="polite"></section>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const API_ROOT = "https://api.tvmaze.com";
    const STORAGE_KEY = "kata-tv-tracker-v1";
    const GITHUB_SYNC_KEY = "kata-tv-tracker-github-sync-v1";
    const GITHUB_OWNER = "katamartini";
    const GITHUB_REPO = "katamartini.github.io";
    const GITHUB_BRANCH = "main";
    const GITHUB_DATA_PATH = "tv-data.json";
    const STATUSES = ["watching", "paused", "finished"];
    const SEARCH_DEBOUNCE_MS = 300;
    const SEARCH_MIN_LENGTH = 2;

    let searchDebounceId = null;
    let searchRequestId = 0;
    let searchWasClicked = false;
    let handledAddPointer = false;
    let dataFileHandle = null;
    let fileSaveTimer = null;
    let isSavingFile = false;
    let repoFileSha = null;
    let repoSaveTimer = null;
    let isRepoSaving = false;
    const VIEW_MODES = ["show", "list", "queue"];

    const state = {
      shows: [],
      selectedId: null,
      searchQuery: "",
      searchResults: [],
      searchHasSearched: false,
      searchActive: false,
      libraryFilter: "all",
      sortMode: "title-asc",
      hideCompleted: false,
      episodeFilter: "all",
      selectedSeason: "all",
      viewMode: "list",
      isSearching: false,
    };

    const nodes = {
      summaryStrip: document.querySelector("#summaryStrip"),
      searchForm: document.querySelector("#searchForm"),
      searchInput: document.querySelector("#searchInput"),
      searchResults: document.querySelector("#searchResults"),
      detail: document.querySelector("#detail"),
      exportButton: document.querySelector("#exportButton"),
      importButton: document.querySelector("#importButton"),
      openFileButton: document.querySelector("#openFileButton"),
      saveFileButton: document.querySelector("#saveFileButton"),
      fileStatus: document.querySelector("#fileStatus"),
      githubToken: document.querySelector("#githubToken"),
      repoLoadButton: document.querySelector("#repoLoadButton"),
      repoSaveButton: document.querySelector("#repoSaveButton"),
      repoAutoSync: document.querySelector("#repoAutoSync"),
      repoStatus: document.querySelector("#repoStatus"),
      importFile: document.querySelector("#importFile"),
      toast: document.querySelector("#toast"),
    };

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const parsed = JSON.parse(raw);
        state.shows = Array.isArray(parsed.shows) ? parsed.shows.map(normalizeShow) : [];
        state.selectedId = parsed.selectedId || state.shows[0]?.id || null;
        state.libraryFilter = parsed.libraryFilter || "all";
        state.sortMode = parsed.sortMode || "title-asc";
        state.hideCompleted = !!parsed.hideCompleted;
        state.viewMode = "list";
      } catch {
        showToast("Saved tracker data could not be read.");
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trackerPayload()));
    }

    function loadRepoSyncSettings() {
      try {
        const parsed = JSON.parse(localStorage.getItem(GITHUB_SYNC_KEY) || "{}");
        nodes.githubToken.value = parsed.token || "";
        nodes.repoAutoSync.checked = !!parsed.autoSync;
      } catch {
        nodes.githubToken.value = "";
        nodes.repoAutoSync.checked = false;
      }
    }

    function saveRepoSyncSettings() {
      localStorage.setItem(GITHUB_SYNC_KEY, JSON.stringify({
        token: nodes.githubToken.value.trim(),
        autoSync: nodes.repoAutoSync.checked,
      }));
      renderRepoStatus();
    }

    function trackerPayload() {
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        shows: state.shows,
        selectedId: state.selectedId,
        libraryFilter: state.libraryFilter,
        sortMode: state.sortMode,
        hideCompleted: state.hideCompleted,
        viewMode: state.viewMode,
      };
    }

    function applyTrackerPayload(parsed) {
      state.shows = Array.isArray(parsed.shows) ? parsed.shows.map(normalizeShow) : [];
      syncAutoCompletion();
      state.selectedId = parsed.selectedId || state.shows[0]?.id || null;
      state.libraryFilter = parsed.libraryFilter || "all";
      state.sortMode = parsed.sortMode || "title-asc";
      state.hideCompleted = !!parsed.hideCompleted;
      state.viewMode = "list";
      state.selectedSeason = "all";
      state.episodeFilter = "all";
      state.searchQuery = "";
      state.searchResults = [];
      state.searchHasSearched = false;
      state.searchActive = false;
      searchWasClicked = false;
    }

    function normalizeShow(show) {
      return {
        id: Number(show.id),
        tvmazeUrl: show.tvmazeUrl || "",
        name: show.name || "Untitled show",
        status: STATUSES.includes(show.status) ? show.status : "watching",
        network: show.network || "",
        premiere: show.premiere || "",
        ended: show.ended || "",
        image: show.image || "",
        genres: Array.isArray(show.genres) ? show.genres : [],
        summary: show.summary || "",
        episodes: Array.isArray(show.episodes) ? show.episodes.map(normalizeEpisode) : [],
        watched: show.watched && typeof show.watched === "object" ? show.watched : {},
        autoFinished: !!show.autoFinished,
        pinned: !!show.pinned,
        addedAt: show.addedAt || new Date().toISOString(),
        updatedAt: show.updatedAt || new Date().toISOString(),
      };
    }

    function normalizeEpisode(episode) {
      return {
        id: Number(episode.id),
        season: Number(episode.season || 0),
        number: Number(episode.number || 0),
        name: episode.name || "Untitled episode",
        airdate: episode.airdate || "",
        runtime: episode.runtime || null,
        summary: episode.summary || "",
      };
    }

    function stripHtml(value) {
      const div = document.createElement("div");
      div.innerHTML = value || "";
      return div.textContent || div.innerText || "";
    }

    function formatYear(show) {
      const start = show.premiere ? show.premiere.slice(0, 4) : "";
      const end = show.ended ? show.ended.slice(0, 4) : "";
      if (start && end && start !== end) return `${start}-${end}`;
      return start || end || "Unknown year";
    }

    function showMeta(show) {
      const bits = [formatYear(show), show.network, show.genres.slice(0, 2).join(", ")].filter(Boolean);
      return bits.join(" / ");
    }

    function imageMarkup(src, className) {
      if (src) {
        return `<img class="${className}" src="${escapeAttr(src)}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: '${className} image-placeholder', textContent: 'No image' }))" />`;
      }
      return `<span class="${className} image-placeholder">No image</span>`;
    }

    function episodeKey(episode) {
      return String(episode.id);
    }

    function airedEpisodes(show) {
      const today = new Date().toISOString().slice(0, 10);
      return show.episodes.filter((episode) => !episode.airdate || episode.airdate <= today);
    }

    function watchedCount(show) {
      return Object.values(show.watched).filter(Boolean).length;
    }

    function isEndedComplete(show) {
      return Boolean(show.ended)
        && show.episodes.length > 0
        && show.episodes.every((episode) => show.watched[episodeKey(episode)]);
    }

    function syncAutoCompletion(show) {
      if (show) {
        const complete = isEndedComplete(show);
        if (complete && show.status !== "finished") {
          show.status = "finished";
          show.autoFinished = true;
          return true;
        }
        if (!complete && show.autoFinished) {
          show.status = "watching";
          show.autoFinished = false;
          return true;
        }
        return false;
      }

      return state.shows.reduce((changed, item) => syncAutoCompletion(item) || changed, false);
    }

    function progress(show) {
      const total = airedEpisodes(show).length;
      return total ? Math.round((watchedCount(show) / total) * 100) : 0;
    }

    function isCompletedShow(show) {
      return show.status === "finished" || progress(show) >= 100;
    }

    function nextEpisode(show) {
      return airedEpisodes(show).find((episode) => !show.watched[episodeKey(episode)]) || null;
    }

    function unwatchedAiredEpisodes(show) {
      return airedEpisodes(show).filter((episode) => !show.watched[episodeKey(episode)]);
    }

    function markAllEpisodesWatched(show) {
      show.episodes.forEach((episode) => {
        show.watched[episodeKey(episode)] = true;
      });
      show.updatedAt = new Date().toISOString();
      syncAutoCompletion(show);
    }

    function nextEpisodeSortValue(show) {
      const episode = nextEpisode(show);
      if (!episode) return "9999-99-99-999-999";
      const airdate = episode.airdate || "0000-00-00";
      return `${airdate}-${String(episode.season).padStart(3, "0")}-${String(episode.number || 0).padStart(3, "0")}`;
    }

    function statusSortValue(show) {
      return {
        watching: 0,
        paused: 1,
        finished: 2,
      }[show.status] ?? 3;
    }

    function sortedShows(shows) {
      const list = [...shows];
      const byTitle = (a, b) => a.name.localeCompare(b.name);

      list.sort((a, b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        if (state.sortMode === "title-desc") return b.name.localeCompare(a.name);
        if (state.sortMode === "most-unwatched") {
          return unwatchedAiredEpisodes(b).length - unwatchedAiredEpisodes(a).length || byTitle(a, b);
        }
        if (state.sortMode === "least-progress") {
          return progress(a) - progress(b) || byTitle(a, b);
        }
        if (state.sortMode === "most-progress") {
          return progress(b) - progress(a) || byTitle(a, b);
        }
        if (state.sortMode === "next-episode") {
          return nextEpisodeSortValue(a).localeCompare(nextEpisodeSortValue(b)) || byTitle(a, b);
        }
        if (state.sortMode === "status") {
          return statusSortValue(a) - statusSortValue(b) || byTitle(a, b);
        }
        if (state.sortMode === "recently-updated") {
          return Date.parse(b.updatedAt || b.addedAt || 0) - Date.parse(a.updatedAt || a.addedAt || 0) || byTitle(a, b);
        }
        return byTitle(a, b);
      });

      return list;
    }

    function seasonsFor(show) {
      const seasons = new Set(show.episodes.map((episode) => episode.season).filter(Boolean));
      return [...seasons].sort((a, b) => a - b);
    }

    function selectedShow() {
      return state.shows.find((show) => show.id === state.selectedId) || null;
    }

    function escapeAttr(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function render(options = {}) {
      renderSummary();
      renderLibraryFilter();
      renderSearchResults();
      renderDetail();
      renderFileStatus();
      renderRepoStatus();
      saveState();
      if (options.persistFile) {
        scheduleDataFileSave();
        scheduleRepoSave();
      }
    }

    function renderFileStatus(text) {
      const supportsFiles = Boolean(window.showOpenFilePicker && window.showSaveFilePicker);
      nodes.openFileButton.disabled = !supportsFiles;
      nodes.saveFileButton.disabled = !supportsFiles || isSavingFile;

      if (text) {
        nodes.fileStatus.textContent = text;
        return;
      }

      if (!supportsFiles) {
        nodes.fileStatus.textContent = "File save unavailable in this browser.";
        return;
      }

      nodes.fileStatus.textContent = dataFileHandle ? `Linked: ${dataFileHandle.name}` : "No data file linked.";
    }

    function scheduleDataFileSave() {
      if (!dataFileHandle) return;
      window.clearTimeout(fileSaveTimer);
      fileSaveTimer = window.setTimeout(() => {
        saveDataFile(false);
      }, 400);
    }

    function renderRepoStatus(text) {
      const hasToken = Boolean(nodes.githubToken.value.trim());
      nodes.repoSaveButton.disabled = !hasToken || isRepoSaving;
      nodes.repoAutoSync.disabled = !hasToken || isRepoSaving;

      if (text) {
        nodes.repoStatus.textContent = text;
        return;
      }

      if (!hasToken) {
        nodes.repoStatus.textContent = `Syncs ${GITHUB_DATA_PATH} after you add a token.`;
        return;
      }

      nodes.repoStatus.textContent = nodes.repoAutoSync.checked
        ? `Auto-saving ${GITHUB_DATA_PATH}.`
        : `Ready to sync ${GITHUB_DATA_PATH}.`;
    }

    function scheduleRepoSave() {
      if (!nodes.repoAutoSync.checked || !nodes.githubToken.value.trim()) return;
      window.clearTimeout(repoSaveTimer);
      repoSaveTimer = window.setTimeout(() => {
        saveRepoData(false);
      }, 900);
    }

    function renderSummary() {
      const shows = state.shows.length;
      const totalAired = state.shows.reduce((sum, show) => sum + airedEpisodes(show).length, 0);
      const totalWatched = state.shows.reduce((sum, show) => sum + watchedCount(show), 0);
      const caughtUp = state.shows.filter((show) => airedEpisodes(show).length > 0 && watchedCount(show) >= airedEpisodes(show).length).length;

      nodes.summaryStrip.innerHTML = `
        <div class="stat"><b>${shows}</b><span>Shows</span></div>
        <div class="stat"><b>${totalWatched}</b><span>Watched</span></div>
        <div class="stat"><b>${Math.max(totalAired - totalWatched, 0)}</b><span>Left</span></div>
        <div class="stat"><b>${caughtUp}</b><span>Caught up</span></div>
      `;
    }

    function renderLibraryFilter() {
      document.querySelectorAll("[data-library-filter]").forEach((button) => {
        button.classList.toggle("active", button.dataset.libraryFilter === state.libraryFilter);
      });
    }

    function libraryShows() {
      if (state.libraryFilter === "active") {
        return state.shows.filter((show) => show.status !== "finished");
      }
      if (state.libraryFilter === "done") {
        return state.shows.filter((show) => show.status === "finished" || progress(show) === 100);
      }
      return state.shows;
    }

    function renderSearchResults() {
      nodes.searchResults.hidden = !state.searchActive || (!state.searchQuery && !state.isSearching && state.searchResults.length === 0);

      if (state.isSearching) {
        nodes.searchResults.innerHTML = `<div class="empty">Searching...</div>`;
        return;
      }

      if (state.searchQuery && state.searchQuery.length < SEARCH_MIN_LENGTH) {
        nodes.searchResults.innerHTML = `<div class="empty">Type at least ${SEARCH_MIN_LENGTH} characters.</div>`;
        return;
      }

      if (!state.searchResults.length) {
        nodes.searchResults.innerHTML = `<div class="empty">${state.searchHasSearched ? "No matching shows found." : "No search results yet."}</div>`;
        return;
      }

      nodes.searchResults.innerHTML = state.searchResults.map((item) => {
        const show = item.show;
        const image = show.image?.medium || show.image?.original || "";
        const network = show.network?.name || show.webChannel?.name || "";
        const alreadyAdded = state.shows.some((existing) => existing.id === show.id);
        return `
          <article class="result">
            ${imageMarkup(image, "thumb")}
            <div>
              <div class="result-name"><strong>${escapeAttr(show.name)}</strong></div>
              <div class="meta">${escapeAttr([formatYear({ premiere: show.premiered, ended: show.ended }), network, (show.genres || []).slice(0, 2).join(", ")].filter(Boolean).join(" / "))}</div>
            </div>
            <div class="result-actions">
              <button type="button" data-add-show="${show.id}" ${alreadyAdded ? "disabled" : ""}>${alreadyAdded ? "Added" : "Add"}</button>
              <button type="button" data-add-watched-show="${show.id}" ${alreadyAdded ? "disabled" : ""}>Watched</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderDetail() {
      if (state.viewMode === "list") {
        renderAllShowsView();
        return;
      }

      if (state.viewMode === "queue") {
        renderQueueView();
        return;
      }

      const show = selectedShow();
      if (!show) {
        nodes.detail.innerHTML = `
          ${renderModebar()}
          <div class="empty" style="margin:16px;">
            Your tracker is ready. Add a show from search and episodes will appear here.
          </div>
        `;
        return;
      }

      const aired = airedEpisodes(show);
      const next = nextEpisode(show);
      const seasons = seasonsFor(show);
      if (state.selectedSeason !== "all" && !seasons.includes(Number(state.selectedSeason))) {
        state.selectedSeason = "all";
      }

      nodes.detail.innerHTML = `
        ${renderModebar()}
        <header class="hero">
          ${imageMarkup(show.image, "poster")}
          <div class="hero-main">
            <div class="hero-head">
              <div>
                <h2 class="hero-title">${escapeAttr(show.name)}</h2>
                <div class="meta">${escapeAttr(showMeta(show))}</div>
              </div>
              <div class="hero-actions">
                <button type="button" data-toggle-pin="${show.id}">${show.pinned ? "Unpin" : "Pin"}</button>
                <button type="button" data-refresh-show="${show.id}">Refresh</button>
                <button type="button" class="danger" data-remove-show="${show.id}">Remove</button>
              </div>
            </div>
            <p class="overview">${escapeAttr(show.summary || "No summary available.")}</p>
            <div class="metrics">
              <div class="metric"><b>${watchedCount(show)}</b><span>Watched</span></div>
              <div class="metric"><b>${aired.length}</b><span>Aired</span></div>
              <div class="metric"><b>${show.episodes.length}</b><span>Total</span></div>
              <div class="metric"><b>${progress(show)}%</b><span>Progress</span></div>
            </div>
            <div class="meta">${next ? `Next up: S${next.season}E${next.number} ${escapeAttr(next.name)}` : "Caught up on every aired episode."}</div>
          </div>
        </header>

        <div class="detail-tools">
          <div class="status-row">
            <label for="statusSelect">Status</label>
            <select class="field" id="statusSelect" data-status-show="${show.id}">
              ${STATUSES.map((status) => `<option value="${status}" ${show.status === status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </div>
          <div class="segmented" role="group" aria-label="Episode filter">
            <button type="button" data-episode-filter="all" class="${state.episodeFilter === "all" ? "active" : ""}">All</button>
            <button type="button" data-episode-filter="unwatched" class="${state.episodeFilter === "unwatched" ? "active" : ""}">Unwatched</button>
            <button type="button" data-episode-filter="watched" class="${state.episodeFilter === "watched" ? "active" : ""}">Watched</button>
          </div>
          <button type="button" data-mark-season="${show.id}">Mark Season</button>
        </div>

        <nav class="season-tabs" aria-label="Seasons">
          <button type="button" class="season-tab ${state.selectedSeason === "all" ? "active" : ""}" data-season="all">All</button>
          ${seasons.map((season) => `<button type="button" class="season-tab ${Number(state.selectedSeason) === season ? "active" : ""}" data-season="${season}">S${season}</button>`).join("")}
        </nav>

        <div class="episode-grid">
          ${renderEpisodes(show)}
        </div>
      `;
    }

    function renderModebar() {
      const unwatchedTotal = state.shows.reduce((sum, show) => sum + unwatchedAiredEpisodes(show).length, 0);
      return `
        <div class="modebar">
          <div class="segmented view-tabs" role="group" aria-label="Detail view">
            <button type="button" data-view-mode="list" class="${state.viewMode === "list" ? "active" : ""}">Shows</button>
            <button type="button" data-view-mode="show" class="${state.viewMode === "show" ? "active" : ""}">Show</button>
            <button type="button" data-view-mode="queue" class="${state.viewMode === "queue" ? "active" : ""}">Queue</button>
          </div>
          <div class="meta">${unwatchedTotal} unwatched aired episode${unwatchedTotal === 1 ? "" : "s"}</div>
        </div>
      `;
    }

    function renderAllShowsView() {
      const library = libraryShows();
      const shows = sortedShows(state.hideCompleted ? library.filter((show) => !isCompletedShow(show)) : library);
      nodes.detail.innerHTML = `
        <section class="all-shows">
          <div class="all-shows-head">
            <div>
              <h2>All Shows</h2>
              <div class="meta">${shows.length} tracked show${shows.length === 1 ? "" : "s"} / click an episode to mark it watched</div>
            </div>
            <div class="list-controls">
              <div class="sort-control">
                <label for="showSort">Sort</label>
                <select class="field" id="showSort" data-show-sort>
                  <option value="title-asc" ${state.sortMode === "title-asc" ? "selected" : ""}>Title A-Z</option>
                  <option value="title-desc" ${state.sortMode === "title-desc" ? "selected" : ""}>Title Z-A</option>
                  <option value="most-unwatched" ${state.sortMode === "most-unwatched" ? "selected" : ""}>Most unwatched</option>
                  <option value="least-progress" ${state.sortMode === "least-progress" ? "selected" : ""}>Least progress</option>
                  <option value="most-progress" ${state.sortMode === "most-progress" ? "selected" : ""}>Most progress</option>
                  <option value="next-episode" ${state.sortMode === "next-episode" ? "selected" : ""}>Next episode date</option>
                  <option value="status" ${state.sortMode === "status" ? "selected" : ""}>Status</option>
                  <option value="recently-updated" ${state.sortMode === "recently-updated" ? "selected" : ""}>Recently updated</option>
                </select>
              </div>
              <label class="hide-completed-control">
                <input type="checkbox" data-hide-completed ${state.hideCompleted ? "checked" : ""} />
                <span>Hide completed</span>
              </label>
            </div>
          </div>
          <div class="show-table">
            ${shows.length ? shows.map(renderShowRow).join("") : `<div class="empty">No shows tracked yet.</div>`}
          </div>
        </section>
      `;
    }

    function renderShowRow(show) {
      const watched = watchedCount(show);
      const aired = airedEpisodes(show).length;
      const unwatched = unwatchedAiredEpisodes(show);
      return `
        <article class="show-row">
          <div class="show-row-pin">
            <button type="button" data-toggle-pin="${show.id}">${show.pinned ? "Unpin" : "Pin"}</button>
          </div>
          ${imageMarkup(show.image, "thumb")}
          <div class="show-row-main">
            <div class="show-row-mainline">
              <span class="show-row-title">${escapeAttr(show.name)}</span>
              ${show.pinned ? `<span class="pin-badge">Pinned</span>` : ""}
              <span class="badge ${show.status}">${escapeAttr(show.status)}</span>
            </div>
            <div class="meta">${escapeAttr(showMeta(show))}</div>
            <div class="meta">${watched}/${aired} aired watched</div>
            <div class="progress-bar" aria-hidden="true"><span style="width:${progress(show)}%"></span></div>
          </div>
          <div class="inline-episodes">
            ${unwatched.length ? unwatched.map((episode) => renderEpisodeButton(show, episode)).join("") : `<div class="empty">Caught up</div>`}
          </div>
          <div class="show-row-actions">
            <button type="button" data-open-show="${show.id}">Open</button>
            <button type="button" data-refresh-show="${show.id}">Refresh</button>
          </div>
        </article>
      `;
    }

    function renderQueueView() {
      const grouped = state.shows
        .map((show) => ({ show, episodes: unwatchedAiredEpisodes(show) }))
        .filter((group) => group.episodes.length > 0)
        .sort((a, b) => a.show.name.localeCompare(b.show.name));
      const total = grouped.reduce((sum, group) => sum + group.episodes.length, 0);

      nodes.detail.innerHTML = `
        ${renderModebar()}
        <section class="queue">
          <div class="queue-head">
            <div>
              <h2>Unwatched Queue</h2>
              <div class="meta">${total} aired episode${total === 1 ? "" : "s"} across ${grouped.length} show${grouped.length === 1 ? "" : "s"}</div>
            </div>
          </div>
          ${grouped.length ? grouped.map(renderQueueShow).join("") : `<div class="empty">No unwatched aired episodes. You are caught up.</div>`}
        </section>
      `;
    }

    function renderQueueShow(group) {
      const { show, episodes } = group;
      return `
        <article class="queue-show">
          <header class="queue-show-head">
            ${imageMarkup(show.image, "thumb")}
            <div>
              <span class="queue-show-title">${escapeAttr(show.name)}</span>
              <div class="meta">${episodes.length} unwatched / ${airedEpisodes(show).length} aired</div>
            </div>
            <button type="button" data-open-show="${show.id}">Open Show</button>
          </header>
          <div class="queue-episodes">
            ${episodes.map((episode) => renderEpisodeButton(show, episode)).join("")}
          </div>
        </article>
      `;
    }

    function renderEpisodes(show) {
      const today = new Date().toISOString().slice(0, 10);
      let episodes = [...show.episodes];

      if (state.selectedSeason !== "all") {
        episodes = episodes.filter((episode) => episode.season === Number(state.selectedSeason));
      }

      if (state.episodeFilter === "watched") {
        episodes = episodes.filter((episode) => show.watched[episodeKey(episode)]);
      } else if (state.episodeFilter === "unwatched") {
        episodes = episodes.filter((episode) => !show.watched[episodeKey(episode)]);
      }

      if (!episodes.length) {
        return `<div class="empty">No episodes match this view.</div>`;
      }

      return episodes.map((episode) => {
        return renderEpisodeButton(show, episode);
      }).join("");
    }

    function renderEpisodeButton(show, episode) {
      const today = new Date().toISOString().slice(0, 10);
      const watched = !!show.watched[episodeKey(episode)];
      const future = episode.airdate && episode.airdate > today;
      const label = `S${episode.season}E${episode.number || "?"}`;
      return `
        <button type="button" class="episode ${watched ? "watched" : ""} ${future ? "future" : ""}" data-toggle-episode="${show.id}:${episode.id}">
          <span class="episode-num">${episode.number || "?"}</span>
          <span class="episode-detail">
            <span class="episode-name">${escapeAttr(label)} ${escapeAttr(episode.name)}</span>
            <span class="episode-date">${escapeAttr(episode.airdate || "No airdate")}${future ? " / unaired" : ""}</span>
            <span class="episode-summary">${escapeAttr(episode.summary || "")}</span>
          </span>
        </button>
      `;
    }

    function queueSearch(query) {
      window.clearTimeout(searchDebounceId);
      const trimmed = query.trim();
      searchRequestId += 1;
      state.searchActive = searchWasClicked;
      state.searchQuery = trimmed;
      state.searchResults = [];
      state.searchHasSearched = false;

      if (!trimmed) {
        state.isSearching = false;
        render();
        return;
      }

      if (trimmed.length < SEARCH_MIN_LENGTH) {
        state.isSearching = false;
        render();
        return;
      }

      state.isSearching = true;
      render();
      searchDebounceId = window.setTimeout(() => {
        searchShows(trimmed);
      }, SEARCH_DEBOUNCE_MS);
    }

    async function searchShows(query) {
      const trimmed = query.trim();
      if (!trimmed || trimmed.length < SEARCH_MIN_LENGTH) {
        queueSearch(trimmed);
        return;
      }

      window.clearTimeout(searchDebounceId);
      const requestId = searchRequestId + 1;
      searchRequestId = requestId;
      state.searchQuery = trimmed;
      state.searchActive = searchWasClicked;
      state.isSearching = true;
      render();
      try {
        const response = await fetch(`${API_ROOT}/search/shows?q=${encodeURIComponent(trimmed)}`);
        if (!response.ok) throw new Error("Search failed");
        const results = await response.json();
        if (requestId !== searchRequestId) return;
        state.searchResults = results;
        state.searchHasSearched = true;
      } catch {
        if (requestId !== searchRequestId) return;
        state.searchResults = [];
        state.searchHasSearched = true;
        showToast("Search failed. TVmaze may be unavailable.");
      } finally {
        if (requestId !== searchRequestId) return;
        state.isSearching = false;
        render();
      }
    }

    async function fetchShow(id) {
      const response = await fetch(`${API_ROOT}/shows/${id}?embed=episodes`);
      if (!response.ok) throw new Error("Show fetch failed");
      const show = await response.json();
      const episodes = (show._embedded?.episodes || [])
        .filter((episode) => episode.type !== "significant_special" && episode.type !== "insignificant_special")
        .map((episode) => normalizeEpisode({
          id: episode.id,
          season: episode.season,
          number: episode.number,
          name: episode.name,
          airdate: episode.airdate,
          runtime: episode.runtime,
          summary: stripHtml(episode.summary),
        }));

      return normalizeShow({
        id: show.id,
        tvmazeUrl: show.url,
        name: show.name,
        status: "watching",
        network: show.network?.name || show.webChannel?.name || "",
        premiere: show.premiered || "",
        ended: show.ended || "",
        image: show.image?.original || show.image?.medium || "",
        genres: show.genres || [],
        summary: stripHtml(show.summary),
        episodes,
        watched: {},
        addedAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      });
    }

    async function addShow(id, options = {}) {
      if (state.shows.some((show) => show.id === id)) return;

      showToast(options.markWatched ? "Adding watched show..." : "Adding show...");
      try {
        const show = await fetchShow(id);
        if (options.markWatched) {
          markAllEpisodesWatched(show);
        }
        state.shows.unshift(show);
        state.selectedId = show.id;
        state.viewMode = "list";
        state.selectedSeason = "all";
        state.episodeFilter = "all";
        closeSearchOverlay();
        showToast(options.markWatched ? `Added ${show.name} as watched.` : `Added ${show.name}.`);
        render({ persistFile: true });
      } catch {
        showToast("Could not add that show.");
      }
    }

    async function refreshShow(id) {
      const existing = state.shows.find((show) => show.id === id);
      if (!existing) return;

      showToast("Refreshing episode list...");
      try {
        const fresh = await fetchShow(id);
        fresh.status = existing.status;
        fresh.watched = existing.watched;
        fresh.addedAt = existing.addedAt;
        fresh.updatedAt = new Date().toISOString();
        syncAutoCompletion(fresh);
        state.shows = state.shows.map((show) => show.id === id ? fresh : show);
        showToast(`Refreshed ${fresh.name}.`);
        render({ persistFile: true });
      } catch {
        showToast("Refresh failed.");
      }
    }

    function toggleEpisode(showId, episodeId) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;

      const episode = show.episodes.find((item) => item.id === episodeId);
      if (!episode) return;

      const key = episodeKey(episode);
      if (show.watched[key]) {
        delete show.watched[key];
      } else {
        show.watched[key] = true;
      }
      show.updatedAt = new Date().toISOString();
      syncAutoCompletion(show);
      render({ persistFile: true });
    }

    function markVisibleSeason(showId) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;

      const visible = show.episodes.filter((episode) => (
        state.selectedSeason === "all" || episode.season === Number(state.selectedSeason)
      ));
      const allWatched = visible.length > 0 && visible.every((episode) => show.watched[episodeKey(episode)]);

      visible.forEach((episode) => {
        const key = episodeKey(episode);
        if (allWatched) {
          delete show.watched[key];
        } else {
          show.watched[key] = true;
        }
      });
      show.updatedAt = new Date().toISOString();
      syncAutoCompletion(show);
      render({ persistFile: true });
    }

    function togglePin(showId) {
      const show = state.shows.find((item) => item.id === showId);
      if (!show) return;

      show.pinned = !show.pinned;
      show.updatedAt = new Date().toISOString();
      render({ persistFile: true });
      showToast(`${show.pinned ? "Pinned" : "Unpinned"} ${show.name}.`);
    }

    function removeShow(id) {
      const show = state.shows.find((item) => item.id === id);
      if (!show) return;
      if (!confirm(`Remove ${show.name} from your tracker?`)) return;

      state.shows = state.shows.filter((item) => item.id !== id);
      state.selectedId = state.shows[0]?.id || null;
      render({ persistFile: true });
      showToast("Show removed.");
    }

    function exportData() {
      const payload = JSON.stringify(trackerPayload(), null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `tv-tracker-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("Export downloaded.");
    }

    function importData(file) {
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(reader.result);
          applyTrackerPayload(parsed);
          render({ persistFile: true });
          showToast("Import complete.");
        } catch {
          showToast("That import file could not be read.");
        }
      });
      reader.readAsText(file);
    }

    async function openDataFile() {
      if (!window.showOpenFilePicker) {
        showToast("File save is unavailable in this browser.");
        return;
      }

      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "TV tracker data",
            accept: { "application/json": [".json"] },
          }],
        });
        const file = await handle.getFile();
        const parsed = JSON.parse(await file.text());
        applyTrackerPayload(parsed);
        dataFileHandle = handle;
        render();
        showToast(`Opened ${handle.name}.`);
      } catch (error) {
        if (error?.name !== "AbortError") {
          showToast("Could not open that data file.");
        }
      }
    }

    async function saveDataFile(chooseFile = true) {
      if (!window.showSaveFilePicker) {
        showToast("File save is unavailable in this browser.");
        return;
      }

      try {
        if (chooseFile || !dataFileHandle) {
          dataFileHandle = await window.showSaveFilePicker({
            suggestedName: "tv-tracker-data.json",
            types: [{
              description: "TV tracker data",
              accept: { "application/json": [".json"] },
            }],
          });
        }

        isSavingFile = true;
        renderFileStatus("Saving data file...");
        const writable = await dataFileHandle.createWritable();
        await writable.write(JSON.stringify(trackerPayload(), null, 2));
        await writable.close();
        isSavingFile = false;
        renderFileStatus(`Saved: ${dataFileHandle.name}`);
        showToast(`Saved ${dataFileHandle.name}.`);
      } catch (error) {
        isSavingFile = false;
        renderFileStatus();
        if (error?.name !== "AbortError") {
          showToast("Could not save the data file.");
        }
      }
    }

    function githubApiHeaders(token) {
      const headers = {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
      };
      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }
      return headers;
    }

    function githubContentsUrl() {
      const path = encodeURIComponent(GITHUB_DATA_PATH).replace(/%2F/g, "/");
      return `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
    }

    function encodeBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function decodeBase64(value) {
      const binary = atob(value.replace(/\s/g, ""));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    async function fetchRepoData(token = nodes.githubToken.value.trim()) {
      const url = `${githubContentsUrl()}?ref=${encodeURIComponent(GITHUB_BRANCH)}`;
      const response = await fetch(url, {
        headers: githubApiHeaders(token),
      });

      if (response.status === 404) {
        repoFileSha = null;
        return null;
      }

      if (!response.ok) {
        throw new Error(`GitHub load failed: ${response.status}`);
      }

      const payload = await response.json();
      repoFileSha = payload.sha || null;
      return JSON.parse(decodeBase64(payload.content || ""));
    }

    async function loadRepoData() {
      try {
        renderRepoStatus("Loading repo data...");
        const parsed = await fetchRepoData();
        if (!parsed) {
          renderRepoStatus(`${GITHUB_DATA_PATH} does not exist yet.`);
          showToast("No repo data file yet. Save Repo will create one.");
          return;
        }

        applyTrackerPayload(parsed);
        render();
        showToast(`Loaded ${GITHUB_DATA_PATH}.`);
      } catch {
        renderRepoStatus();
        showToast("Could not load repo data.");
      }
    }

    async function autoLoadRepoDataIfEmpty() {
      if (state.shows.length > 0) return;

      try {
        renderRepoStatus("Checking repo data...");
        const parsed = await fetchRepoData("");
        if (!parsed || !Array.isArray(parsed.shows) || parsed.shows.length === 0) {
          renderRepoStatus();
          return;
        }

        applyTrackerPayload(parsed);
        render();
        showToast(`Loaded ${GITHUB_DATA_PATH}.`);
      } catch {
        renderRepoStatus();
      }
    }

    async function saveRepoData(chooseFreshSha = true) {
      const token = nodes.githubToken.value.trim();
      if (!token) {
        renderRepoStatus();
        showToast("Add a GitHub token first.");
        return;
      }

      try {
        isRepoSaving = true;
        renderRepoStatus("Saving repo data...");
        if (chooseFreshSha || !repoFileSha) {
          await fetchRepoData(token);
        }

        const body = {
          message: "Update TV tracker data",
          content: encodeBase64(JSON.stringify(trackerPayload(), null, 2)),
          branch: GITHUB_BRANCH,
        };
        if (repoFileSha) {
          body.sha = repoFileSha;
        }

        const response = await fetch(githubContentsUrl(), {
          method: "PUT",
          headers: {
            ...githubApiHeaders(token),
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error(`GitHub save failed: ${response.status}`);
        }

        const result = await response.json();
        repoFileSha = result.content?.sha || repoFileSha;
        isRepoSaving = false;
        renderRepoStatus(`Saved ${GITHUB_DATA_PATH}.`);
        showToast(`Saved ${GITHUB_DATA_PATH}.`);
      } catch {
        isRepoSaving = false;
        renderRepoStatus();
        showToast("Could not save repo data.");
      }
    }

    function showToast(message) {
      nodes.toast.textContent = message;
      nodes.toast.classList.add("visible");
      window.clearTimeout(showToast.timeout);
      showToast.timeout = window.setTimeout(() => {
        nodes.toast.classList.remove("visible");
      }, 2200);
    }

    function closeSearchOverlay() {
      state.searchActive = false;
      searchWasClicked = false;
      renderSearchResults();
    }

    nodes.searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      searchWasClicked = true;
      state.searchActive = true;
      const query = nodes.searchInput.value.trim();
      if (query) searchShows(query);
      if (!query) queueSearch("");
    });

    nodes.searchInput.addEventListener("input", () => {
      queueSearch(nodes.searchInput.value);
    });

    nodes.searchInput.addEventListener("pointerdown", () => {
      searchWasClicked = true;
      state.searchActive = true;
      renderSearchResults();
    });

    nodes.searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSearchOverlay();
        nodes.searchInput.blur();
      }
    });

    document.addEventListener("pointerdown", (event) => {
      const addButton = event.target.closest("[data-add-show]");
      if (addButton && !addButton.disabled) {
        handledAddPointer = true;
        event.preventDefault();
        addShow(Number(addButton.dataset.addShow));
        return;
      }

      const watchedButton = event.target.closest("[data-add-watched-show]");
      if (watchedButton && !watchedButton.disabled) {
        handledAddPointer = true;
        event.preventDefault();
        addShow(Number(watchedButton.dataset.addWatchedShow), { markWatched: true });
        return;
      }

      const keepsSearchOpen = event.target.closest("#searchInput")
        || event.target.closest("#searchForm button");
      if (keepsSearchOpen) return;
      closeSearchOverlay();
    }, true);

    document.addEventListener("click", (event) => {
      const addButton = event.target.closest("[data-add-show]");
      if (addButton) {
        if (handledAddPointer) {
          handledAddPointer = false;
          return;
        }
        addShow(Number(addButton.dataset.addShow));
        return;
      }

      const watchedButton = event.target.closest("[data-add-watched-show]");
      if (watchedButton) {
        if (handledAddPointer) {
          handledAddPointer = false;
          return;
        }
        addShow(Number(watchedButton.dataset.addWatchedShow), { markWatched: true });
        return;
      }

      const selectShow = event.target.closest("[data-select-show]");
      if (selectShow) {
        state.selectedId = Number(selectShow.dataset.selectShow);
        state.viewMode = "show";
        state.selectedSeason = "all";
        state.episodeFilter = "all";
        render();
        return;
      }

      const viewMode = event.target.closest("[data-view-mode]");
      if (viewMode) {
        state.viewMode = viewMode.dataset.viewMode;
        render();
        return;
      }

      const openShow = event.target.closest("[data-open-show]");
      if (openShow) {
        state.selectedId = Number(openShow.dataset.openShow);
        state.viewMode = "show";
        state.selectedSeason = "all";
        state.episodeFilter = "unwatched";
        render();
        return;
      }

      const libraryFilter = event.target.closest("[data-library-filter]");
      if (libraryFilter) {
        state.libraryFilter = libraryFilter.dataset.libraryFilter;
        render();
        return;
      }

      const episodeFilter = event.target.closest("[data-episode-filter]");
      if (episodeFilter) {
        state.episodeFilter = episodeFilter.dataset.episodeFilter;
        render();
        return;
      }

      const season = event.target.closest("[data-season]");
      if (season) {
        state.selectedSeason = season.dataset.season;
        render();
        return;
      }

      const toggle = event.target.closest("[data-toggle-episode]");
      if (toggle) {
        const [showId, episodeId] = toggle.dataset.toggleEpisode.split(":").map(Number);
        toggleEpisode(showId, episodeId);
        return;
      }

      const refresh = event.target.closest("[data-refresh-show]");
      if (refresh) {
        refreshShow(Number(refresh.dataset.refreshShow));
        return;
      }

      const pin = event.target.closest("[data-toggle-pin]");
      if (pin) {
        togglePin(Number(pin.dataset.togglePin));
        return;
      }

      const remove = event.target.closest("[data-remove-show]");
      if (remove) {
        removeShow(Number(remove.dataset.removeShow));
        return;
      }

      const markSeason = event.target.closest("[data-mark-season]");
      if (markSeason) {
        markVisibleSeason(Number(markSeason.dataset.markSeason));
      }
    });

    document.addEventListener("keydown", (event) => {
      const card = event.target.closest("[data-select-show]");
      if (!card) return;
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        state.selectedId = Number(card.dataset.selectShow);
        state.viewMode = "show";
        state.selectedSeason = "all";
        state.episodeFilter = "all";
        render();
      }
    });

    nodes.detail.addEventListener("change", (event) => {
      const showSort = event.target.closest("[data-show-sort]");
      if (showSort) {
        state.sortMode = showSort.value;
        render();
        return;
      }

      const hideCompleted = event.target.closest("[data-hide-completed]");
      if (hideCompleted) {
        state.hideCompleted = hideCompleted.checked;
        render();
        return;
      }

      const status = event.target.closest("[data-status-show]");
      if (!status) return;

      const show = state.shows.find((item) => item.id === Number(status.dataset.statusShow));
      if (!show) return;
      show.status = status.value;
      show.autoFinished = false;
      show.updatedAt = new Date().toISOString();
      syncAutoCompletion(show);
      render({ persistFile: true });
    });

    nodes.exportButton.addEventListener("click", exportData);
    nodes.importButton.addEventListener("click", () => nodes.importFile.click());
    nodes.openFileButton.addEventListener("click", openDataFile);
    nodes.saveFileButton.addEventListener("click", () => saveDataFile(true));
    nodes.repoLoadButton.addEventListener("click", loadRepoData);
    nodes.repoSaveButton.addEventListener("click", () => saveRepoData(true));
    nodes.githubToken.addEventListener("input", saveRepoSyncSettings);
    nodes.repoAutoSync.addEventListener("change", saveRepoSyncSettings);
    nodes.importFile.addEventListener("change", () => {
      const file = nodes.importFile.files[0];
      if (file) importData(file);
      nodes.importFile.value = "";
    });

    loadRepoSyncSettings();
    loadState();
    syncAutoCompletion();
    render();
    autoLoadRepoDataIfEmpty();
  </script>
</body>
</html>
