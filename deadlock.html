<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Most Played Heroes</title>
  <style>
    :root {
      --bg: #1f2430;
      --panel: #2a3140;
      --panel-2: #323a4a;
      --header: #252c39;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #b7ff2a;
      --border: #3a4353;
      --bar-bg: #434d5f;
      --matches-bar: #ff2a1a;
      --win-bar: #98e61d;
      --streak-win-bg: #23421c;
      --streak-win-border: #4f8f37;
      --streak-loss-bg: #4a1f1f;
      --streak-loss-border: #a84040;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      width: min(1900px, calc(100vw - 48px));
    }

    .wrap,
    .mid-column,
    .chart-column {
      min-width: 0;
    }

    .wrap,
    .stats-card,
    .streaks-card,
    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .wrap {
      flex: 0 0 520px;
      width: 520px;
    }

    .mid-column {
      flex: 0 0 260px;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chart-column {
      flex: 0 0 1040px;
      width: 1040px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 700px;
    }

    .titlebar,
    .stats-titlebar {
      padding: 10px 12px 6px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #ffffff;
    }

    .titlebar .sub,
    .stats-titlebar .sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
      vertical-align: middle;
    }

    .topbar {
      padding: 10px 12px;
      background: #222834;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .topbar input {
      width: 100%;
      min-width: 0;
      background: #151a23;
      color: #fff;
      border: 1px solid #465062;
      padding: 7px 8px;
      font-size: 12px;
      outline: none;
    }

    .topbar button {
      flex: 0 0 auto;
      background: #151a23;
      color: #fff;
      border: 1px solid #465062;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .topbar button:hover {
      background: #1d2330;
    }

    .status {
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      background: #222834;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      background: var(--header);
      color: #ffffff;
      text-align: left;
      font-size: 12px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover {
      background: #2b3342;
    }

    tbody tr:nth-child(odd) {
      background: var(--panel);
    }

    tbody tr:nth-child(even) {
      background: var(--panel-2);
    }

    tbody td {
      padding: 3px 10px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
    }

    thead th:nth-child(2),
    tbody td:nth-child(2),
    thead th:nth-child(3),
    tbody td:nth-child(3) {
      width: 170px;
    }

    thead th:nth-child(1),
    tbody td:nth-child(1) {
      width: auto;
    }

    .hero-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .icon-slot {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      background: linear-gradient(135deg, #4b5563, #2f3745);
      border: 1px solid #596274;
      display: block;
      overflow: hidden;
    }

    .icon-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hero-meta {
      min-width: 0;
    }

    .hero-name {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.02;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero-date {
      color: #9fb0c7;
      font-size: 10px;
      margin-top: 1px;
      line-height: 1.02;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    .hero-date:hover {
      color: #c6d6ea;
      text-decoration: underline;
    }

    .stat-cell {
      min-width: 0;
    }

    .stat-value {
      color: #ffffff;
      font-size: 12px;
      line-height: 1;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .bar-wrap {
      width: 100%;
      height: 4px;
      background: var(--bar-bg);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
    }

    .bar-fill.matches {
      background: var(--matches-bar);
    }

    .bar-fill.win {
      background: var(--win-bar);
    }

    .sort-indicator {
      margin-left: 4px;
      color: #cbd5e1;
      font-size: 10px;
    }

    .empty {
      padding: 14px 12px;
      color: var(--muted);
      font-size: 12px;
      display: none;
    }

    .stats-body {
      padding: 12px;
    }

    .stats-grid {
      display: grid;
      gap: 10px;
    }

    .stats-item {
      background: #222834;
      border: 1px solid var(--border);
      padding: 10px 11px;
    }

    .stats-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }

    .stats-value-big {
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.05;
    }

    .stats-value-small {
      color: #ffffff;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
    }

    .streaks-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .streak-box {
      border: 1px solid;
      padding: 10px;
    }

    .streak-box.win {
      background: var(--streak-win-bg);
      border-color: var(--streak-win-border);
    }

    .streak-box.loss {
      background: var(--streak-loss-bg);
      border-color: var(--streak-loss-border);
    }

    .streak-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .streak-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: rgba(255,255,255,0.8);
      font-weight: 700;
    }

    .streak-count {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      white-space: nowrap;
    }

    .streak-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      align-items: center;
    }

    .streak-icon {
      width: 30px;
      height: 30px;
      flex: 0 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
      border: none;
    }

    .streak-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .streak-empty {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }

    .chart-body {
      padding: 12px;
      height: 760px;
      background: #222834;
      border-top: 1px solid var(--border);
    }

    .chart-body canvas {
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 1240px) {
      .page {
        flex-wrap: wrap;
      }

      .wrap {
        flex: 1 1 520px;
      }

      .mid-column {
        flex: 0 0 260px;
      }

      .chart-column {
        flex: 1 1 100%;
        min-width: 0;
        width: 100%;
      }

      .chart-body {
        height: 420px;
      }
    }

    @media (max-width: 860px) {
      .page {
        flex-direction: column;
        width: min(520px, calc(100vw - 48px));
      }

      .wrap,
      .mid-column,
      .chart-column {
        width: 100%;
        flex: 0 0 auto;
        min-width: 0;
      }

      .chart-body {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="titlebar">
        MOST PLAYED HEROES<span class="sub">ALL TIME</span>
      </div>

      <div class="topbar">
        <input id="searchBox" type="search" placeholder="Filter heroes..." />
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <div id="status" class="status">Loading spreadsheet data...</div>

      <table id="dataTable" aria-label="Most played heroes">
        <thead></thead>
        <tbody></tbody>
      </table>

      <div id="emptyState" class="empty">No rows match the current filter.</div>
    </div>

    <div class="mid-column">
      <div class="stats-card">
        <div class="stats-titlebar">
          OVERALL STATS<span class="sub">MATCHES SHEET</span>
        </div>
        <div class="stats-body">
          <div class="stats-grid">
            <div class="stats-item">
              <div class="stats-label">Matches</div>
              <div class="stats-value-big" id="overallMatches">-</div>
            </div>
            <div class="stats-item">
              <div class="stats-label">Wins</div>
              <div class="stats-value-big" id="overallWins">-</div>
            </div>
            <div class="stats-item">
              <div class="stats-label">Losses</div>
              <div class="stats-value-big" id="overallLosses">-</div>
            </div>
            <div class="stats-item">
              <div class="stats-label">Overall Win %</div>
              <div class="stats-value-big" id="overallWinPct">-</div>
            </div>
            <div class="stats-item">
              <div class="stats-label">First Match</div>
              <div class="stats-value-small" id="firstMatchPlayed">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="streaks-card">
        <div class="stats-titlebar">
          STREAKS<span class="sub">LONGEST RUNS</span>
        </div>
        <div class="streaks-body">
          <div class="streak-box win">
            <div class="streak-header">
              <div class="streak-title">Longest Win Streak</div>
              <div class="streak-count" id="longestWinCount">-</div>
            </div>
            <div class="streak-icons" id="longestWinIcons"></div>
          </div>

          <div class="streak-box loss">
            <div class="streak-header">
              <div class="streak-title">Longest Loss Streak</div>
              <div class="streak-count" id="longestLossCount">-</div>
            </div>
            <div class="streak-icons" id="longestLossIcons"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="chart-column">
      <div class="chart-card">
        <div class="stats-titlebar">
          W-L DELTA OVER TIME<span class="sub">ALL MATCHES</span>
        </div>
        <div class="chart-body">
          <canvas id="winrateChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const SHEET_ID = "1mygk8trLTWuWgNcHNXYKb_3ZmHgRjDRT5dk0fZ9mMc4";
    const HERO_GID = "0";
    const MATCHES_GID = "852547275";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${HERO_GID}`;
    const MATCHES_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${MATCHES_GID}`;

    const DATE_INDEX = 0;
    const HERO_NAME_INDEX = 1;
    const MATCHES_INDEX = 7;
    const WINRATE_INDEX = 6;

    const MATCHES_SHEET_DATE_INDEX = 1;
    const MATCHES_SHEET_HERO_INDEX = 2;
    const MATCHES_SHEET_RESULT_INDEX = 3;

    const SORT_BY_DATE = "__date__";

    const table = document.getElementById("dataTable");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");
    const statusEl = document.getElementById("status");
    const searchBox = document.getElementById("searchBox");
    const resetBtn = document.getElementById("resetBtn");
    const emptyState = document.getElementById("emptyState");

    const overallMatchesEl = document.getElementById("overallMatches");
    const overallWinsEl = document.getElementById("overallWins");
    const overallLossesEl = document.getElementById("overallLosses");
    const overallWinPctEl = document.getElementById("overallWinPct");
    const firstMatchPlayedEl = document.getElementById("firstMatchPlayed");

    const longestWinCountEl = document.getElementById("longestWinCount");
    const longestLossCountEl = document.getElementById("longestLossCount");
    const longestWinIconsEl = document.getElementById("longestWinIcons");
    const longestLossIconsEl = document.getElementById("longestLossIcons");

    const chartCanvas = document.getElementById("winrateChart");
    let winrateChart = null;

    let allRows = [];
    let filteredRows = [];
    let sortState = { col: MATCHES_INDEX, dir: "desc" };
    let maxMatches = 0;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell);
            cell = "";
          } else if (ch === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else if (ch === "\r") {
          } else {
            cell += ch;
          }
        }
      }

      row.push(cell);
      rows.push(row);

      return rows.filter(r => !(r.length === 1 && r[0] === ""));
    }

    function normalizeValue(value) {
      if (value == null) return "";
      return String(value).trim();
    }

    function parseNumeric(value) {
      const v = normalizeValue(value).replace(/[$,%]/g, "").replace(/,/g, "");
      const num = Number(v);
      return Number.isNaN(num) ? null : num;
    }

    function parseSheetDate(value) {
      const v = normalizeValue(value);
      if (!v) return null;

      const d = new Date(v);
      if (!Number.isNaN(d.getTime())) return d;

      const m = v.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2,4})$/);
      if (m) {
        let year = Number(m[3]);
        if (year < 100) year += 2000;
        const parsed = new Date(year, Number(m[1]) - 1, Number(m[2]));
        if (!Number.isNaN(parsed.getTime())) return parsed;
      }

      return null;
    }

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function formatExactDate(value) {
      const d = parseSheetDate(value);
      if (!d) return normalizeValue(value);
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "numeric",
        day: "numeric"
      });
    }

    function formatLongDate(value) {
      const d = value instanceof Date ? value : parseSheetDate(value);
      if (!d) return normalizeValue(value);
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatDaysAgo(value) {
      const d = parseSheetDate(value);
      if (!d) return normalizeValue(value);

      const today = startOfDay(new Date());
      const then = startOfDay(d);
      const diffMs = today - then;
      const days = Math.round(diffMs / 86400000);

      if (days <= 0) return "Today";
      if (days === 1) return "1 day ago";
      return `${days} days ago`;
    }

    function inferType(value) {
      const v = normalizeValue(value);
      if (v === "") return { type: "empty", value: "" };

      const num = parseNumeric(v);
      if (num !== null && /^[-+]?\d[\d,]*\.?\d*%?$/.test(v)) {
        return { type: "number", value: num };
      }

      const date = parseSheetDate(v);
      if (date) {
        return { type: "date", value: date.getTime() };
      }

      return { type: "text", value: v.toLowerCase() };
    }

    function compareValues(a, b) {
      const av = inferType(a);
      const bv = inferType(b);

      const typeOrder = { empty: 0, number: 1, date: 2, text: 3 };
      if (av.type !== bv.type) {
        return typeOrder[av.type] - typeOrder[bv.type];
      }

      if (av.value < bv.value) return -1;
      if (av.value > bv.value) return 1;
      return 0;
    }

    function isTotalRow(row) {
      return normalizeValue(row[DATE_INDEX]) === "";
    }

    function getSortValue(row, columnIndex) {
      if (columnIndex === SORT_BY_DATE) {
        const d = parseSheetDate(row[DATE_INDEX]);
        return d ? d.toISOString() : "";
      }
      return row[columnIndex];
    }

    function sortRows() {
      filteredRows.sort((a, b) => {
        const result = compareValues(getSortValue(a, sortState.col), getSortValue(b, sortState.col));
        return sortState.dir === "asc" ? result : -result;
      });
    }

    function setSort(col, defaultDir = "desc") {
      if (sortState.col === col) {
        sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
      } else {
        sortState.col = col;
        sortState.dir = defaultDir;
      }
      sortRows();
      renderHeader();
      renderTable();
    }

    function heroIconPath(heroName) {
      const safe = normalizeValue(heroName).toLowerCase();
      return `images/deadlock/icons/${encodeURIComponent(safe + ".png")}`;
    }

    function loadHeroIcon(heroName) {
      return new Promise((resolve) => {
        const hero = normalizeValue(heroName);
        if (!hero) {
          resolve(null);
          return;
        }

        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = heroIconPath(hero);
      });
    }

    async function buildPointStyles(series) {
      return Promise.all(series.map(p => loadHeroIcon(p.hero)));
    }

    function buildIcon(heroName, className = "icon-slot") {
      const slot = document.createElement("div");
      slot.className = className;

      const img = document.createElement("img");
      img.src = heroIconPath(heroName);
      img.alt = heroName;
      img.loading = "lazy";
      img.title = heroName;

      img.onerror = function () {
        this.style.display = "none";
      };

      slot.appendChild(img);
      return slot;
    }

    function renderHeroCell(row) {
      const wrapper = document.createElement("div");
      wrapper.className = "hero-cell";

      const heroName = normalizeValue(row[HERO_NAME_INDEX]).trim();
      const icon = buildIcon(heroName, "icon-slot");

      const meta = document.createElement("div");
      meta.className = "hero-meta";

      const name = document.createElement("div");
      name.className = "hero-name";
      name.textContent = heroName || "";

      const date = document.createElement("div");
      date.className = "hero-date";
      date.textContent = formatDaysAgo(row[DATE_INDEX]);
      date.title = formatExactDate(row[DATE_INDEX]);
      date.addEventListener("click", (e) => {
        e.stopPropagation();
        setSort(SORT_BY_DATE, "desc");
      });

      meta.appendChild(name);
      meta.appendChild(date);

      wrapper.appendChild(icon);
      wrapper.appendChild(meta);

      return wrapper;
    }

    function renderStatCell(valueText, pct, fillClass) {
      const wrapper = document.createElement("div");
      wrapper.className = "stat-cell";

      const value = document.createElement("div");
      value.className = "stat-value";
      value.textContent = valueText;

      const barWrap = document.createElement("div");
      barWrap.className = "bar-wrap";

      const bar = document.createElement("div");
      bar.className = `bar-fill ${fillClass}`;
      bar.style.width = `${Math.max(0, Math.min(100, pct))}%`;

      barWrap.appendChild(bar);
      wrapper.appendChild(value);
      wrapper.appendChild(barWrap);

      return wrapper;
    }

    function renderMatchesCell(row) {
      const matches = parseNumeric(row[MATCHES_INDEX]) ?? 0;
      const pct = maxMatches > 0 ? (matches / maxMatches) * 100 : 0;
      return renderStatCell(matches, pct, "matches");
    }

    function renderWinCell(row) {
      const winRaw = normalizeValue(row[WINRATE_INDEX]);
      const winPct = parseNumeric(winRaw) ?? 0;
      return renderStatCell(winRaw, winPct, "win");
    }

    function renderTable() {
      tbody.innerHTML = "";

      emptyState.style.display = filteredRows.length ? "none" : "block";

      filteredRows.forEach((row) => {
        const tr = document.createElement("tr");

        const heroTd = document.createElement("td");
        heroTd.appendChild(renderHeroCell(row));
        tr.appendChild(heroTd);

        const matchesTd = document.createElement("td");
        matchesTd.appendChild(renderMatchesCell(row));
        tr.appendChild(matchesTd);

        const winTd = document.createElement("td");
        winTd.appendChild(renderWinCell(row));
        tr.appendChild(winTd);

        tbody.appendChild(tr);
      });

      statusEl.textContent = `${filteredRows.length} row(s) shown`;
    }

    function renderHeader() {
      thead.innerHTML = "";
      const tr = document.createElement("tr");

      const columns = [
        { label: "Hero", index: HERO_NAME_INDEX, defaultDir: "asc" },
        { label: "Matches", index: MATCHES_INDEX, defaultDir: "desc" },
        { label: "Win %", index: WINRATE_INDEX, defaultDir: "desc" }
      ];

      columns.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col.label;

        if (sortState.col === col.index) {
          const span = document.createElement("span");
          span.className = "sort-indicator";
          span.textContent = sortState.dir === "asc" ? "▲" : "▼";
          th.appendChild(span);
        }

        th.addEventListener("click", () => {
          setSort(col.index, col.defaultDir);
        });

        tr.appendChild(th);
      });

      thead.appendChild(tr);
    }

    function applyFilter() {
      const q = searchBox.value.trim().toLowerCase();

      filteredRows = !q
        ? [...allRows]
        : allRows.filter(row =>
            String(row[HERO_NAME_INDEX] ?? "").toLowerCase().includes(q) ||
            String(row[DATE_INDEX] ?? "").toLowerCase().includes(q)
          );

      sortRows();
      renderHeader();
      renderTable();
    }

    function findLongestStreak(rows, targetResult) {
      let best = [];
      let current = [];

      for (const row of rows) {
        const result = normalizeValue(row[MATCHES_SHEET_RESULT_INDEX]).toLowerCase();
        const hero = normalizeValue(row[MATCHES_SHEET_HERO_INDEX]);

        if (!hero) continue;

        if (result === targetResult) {
          current.push(hero);
          if (current.length > best.length) {
            best = [...current];
          }
        } else {
          current = [];
        }
      }

      return best;
    }

    function renderStreak(container, heroes) {
      container.innerHTML = "";

      if (!heroes.length) {
        const empty = document.createElement("div");
        empty.className = "streak-empty";
        empty.textContent = "No streak found";
        container.appendChild(empty);
        return;
      }

      heroes.forEach(hero => {
        container.appendChild(buildIcon(hero, "streak-icon"));
      });
    }

    function buildDeltaSeries(rows) {
      const dataRows = rows
        .slice(1)
        .filter(r => r.some(cell => normalizeValue(cell) !== ""));

      let wins = 0;
      let losses = 0;
      let classifiedMatchNumber = 0;

      return dataRows
        .map(row => {
          const result = normalizeValue(row[MATCHES_SHEET_RESULT_INDEX]).toLowerCase();
          const date = parseSheetDate(row[MATCHES_SHEET_DATE_INDEX]);
          const hero = normalizeValue(row[MATCHES_SHEET_HERO_INDEX]);

          if (result !== "win" && result !== "loss") return null;

          classifiedMatchNumber += 1;

          if (result === "win") {
            wins += 1;
          } else {
            losses += 1;
          }

          return {
            xLabel: date ? formatLongDate(date) : `Match ${classifiedMatchNumber}`,
            y: wins - losses,
            hero,
            result,
            matchNumber: classifiedMatchNumber
          };
        })
        .filter(Boolean);
    }

    function buildOriginTrendline(series) {
      const n = series.length;
      if (!n) return [0];

      let sumXY = 0;
      let sumXX = 0;

      for (let i = 0; i < n; i++) {
        const x = i + 1;
        const y = series[i].y;
        sumXY += x * y;
        sumXX += x * x;
      }

      const slope = sumXX === 0 ? 0 : sumXY / sumXX;

      return [0, ...series.map((_, i) => Number((slope * (i + 1)).toFixed(2)))];
    }

    const heroPointPlugin = {
      id: "heroPointPlugin",
      afterDatasetsDraw(chart, args, pluginOptions) {
        const { ctx } = chart;
        const meta = chart.getDatasetMeta(0);
        const icons = pluginOptions.icons || [];
        const size = pluginOptions.size || 6;

        ctx.save();
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        meta.data.forEach((point, i) => {
          const icon = icons[i];
          if (!icon) return;

          const x = point.x - size / 2;
          const y = point.y - size / 2;
          ctx.drawImage(icon, x, y, size, size);
        });

        ctx.restore();
      }
    };

    async function renderWinrateChart(rows) {
      const series = buildDeltaSeries(rows);

      if (winrateChart) {
        winrateChart.destroy();
        winrateChart = null;
      }

      if (!series.length) return;

      const pointIcons = await buildPointStyles(series);
      const labels = ["Start", ...series.map(p => p.xLabel)];
      const deltaData = [0, ...series.map(p => p.y)];
      const trendline = buildOriginTrendline(series);
      const pluginIcons = [null, ...pointIcons];

      const yValues = [...deltaData, ...trendline];
      const minY = Math.min(...yValues);
      const maxY = Math.max(...yValues);
      const yPadding = Math.max(2, Math.ceil((maxY - minY) * 0.1));

      winrateChart = new Chart(chartCanvas, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "W-L Delta",
              data: deltaData,
              borderColor: "#98e61d",
              backgroundColor: "rgba(152, 230, 29, 0.10)",
              pointRadius: 8,
              pointHoverRadius: 10,
              pointHitRadius: 14,
              pointBackgroundColor: "rgba(0,0,0,0)",
              pointBorderColor: "rgba(0,0,0,0)",
              pointBorderWidth: 0,
              borderWidth: 2,
              tension: 0.2,
              fill: false
            },
            {
              label: "Trend",
              data: trendline,
              borderColor: "rgba(243, 244, 246, 0.35)",
              pointRadius: 0,
              pointHoverRadius: 0,
              borderWidth: 2,
              tension: 0,
              fill: false,
              borderDash: [6, 6]
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: "nearest",
            intersect: false
          },
          plugins: {
            heroPointPlugin: {
              icons: pluginIcons,
              size: 12
            },
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                title(items) {
                  const i = items[0].dataIndex;
                  return labels[i];
                },
                label(context) {
                  const i = context.dataIndex;

                  if (context.datasetIndex === 0) {
                    const value = deltaData[i];
                    return `Delta: ${value > 0 ? "+" : ""}${value}`;
                  }

                  const value = trendline[i];
                  return `Trend: ${value > 0 ? "+" : ""}${value}`;
                },
                afterLabel(context) {
                  if (context.datasetIndex !== 0) return "";

                  const i = context.dataIndex;
                  if (i === 0) return "Origin";

                  const p = series[i - 1];
                  return `After match ${p.matchNumber} (${p.hero}, ${p.result})`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#9ca3af",
                maxTicksLimit: 10,
                callback: function(value, index) {
                  return index === 0 ? "" : this.getLabelForValue(value);
                }
              },
              grid: {
                color: "rgba(255,255,255,0.06)"
              }
            },
            y: {
              min: minY - yPadding,
              max: maxY + yPadding,
              ticks: {
                color: "#9ca3af",
                callback: value => value > 0 ? `+${value}` : `${value}`
              },
              grid: {
                color: "rgba(255,255,255,0.06)"
              }
            }
          }
        },
        plugins: [heroPointPlugin]
      });
    }

    function setOverallStats(matchesRows) {
      const dataRows = matchesRows
        .slice(1)
        .filter(r => r.some(cell => normalizeValue(cell) !== ""));

      const classifiedRows = dataRows.filter(row => {
        const result = normalizeValue(row[MATCHES_SHEET_RESULT_INDEX]).toLowerCase();
        return result === "win" || result === "loss";
      });

      const totalMatches = classifiedRows.length;

      const wins = classifiedRows.filter(row =>
        normalizeValue(row[MATCHES_SHEET_RESULT_INDEX]).toLowerCase() === "win"
      ).length;

      const losses = classifiedRows.filter(row =>
        normalizeValue(row[MATCHES_SHEET_RESULT_INDEX]).toLowerCase() === "loss"
      ).length;

      const firstDate = classifiedRows
        .map(row => parseSheetDate(row[MATCHES_SHEET_DATE_INDEX]))
        .filter(Boolean)
        .sort((a, b) => a - b)[0];

      const overallWinPct = totalMatches > 0
        ? `${Math.round((wins / totalMatches) * 100)}%`
        : "-";

      overallMatchesEl.textContent = totalMatches;
      overallWinsEl.textContent = wins;
      overallLossesEl.textContent = losses;
      overallWinPctEl.textContent = overallWinPct;
      firstMatchPlayedEl.textContent = firstDate ? formatLongDate(firstDate) : "-";

      const longestWin = findLongestStreak(classifiedRows, "win");
      const longestLoss = findLongestStreak(classifiedRows, "loss");

      longestWinCountEl.textContent = longestWin.length;
      longestLossCountEl.textContent = longestLoss.length;

      renderStreak(longestWinIconsEl, longestWin);
      renderStreak(longestLossIconsEl, longestLoss);

      renderWinrateChart(matchesRows);
    }

    async function loadSheet() {
      try {
        const [heroRes, matchesRes] = await Promise.all([
          fetch(CSV_URL),
          fetch(MATCHES_CSV_URL)
        ]);

        if (!heroRes.ok) throw new Error(`Hero sheet HTTP ${heroRes.status}`);
        if (!matchesRes.ok) throw new Error(`Matches sheet HTTP ${matchesRes.status}`);

        const heroCsvText = await heroRes.text();
        const heroRows = parseCSV(heroCsvText);

        if (!heroRows.length) {
          throw new Error("No hero data found.");
        }

        allRows = heroRows
          .slice(1)
          .filter(r => r.some(cell => normalizeValue(cell) !== ""))
          .filter(r => !isTotalRow(r));

        maxMatches = Math.max(
          ...allRows.map(row => parseNumeric(row[MATCHES_INDEX]) ?? 0),
          0
        );

        filteredRows = [...allRows];
        sortRows();
        renderHeader();
        renderTable();

        const matchesCsvText = await matchesRes.text();
        const matchesRows = parseCSV(matchesCsvText);

        if (!matchesRows.length) {
          throw new Error("No matches data found.");
        }

        setOverallStats(matchesRows);
      } catch (err) {
        statusEl.innerHTML = `Could not load the Google Sheet automatically. Error: <strong>${err.message}</strong>`;
        thead.innerHTML = "";
        tbody.innerHTML = "";
        emptyState.style.display = "none";

        overallMatchesEl.textContent = "-";
        overallWinsEl.textContent = "-";
        overallLossesEl.textContent = "-";
        overallWinPctEl.textContent = "-";
        firstMatchPlayedEl.textContent = "-";

        longestWinCountEl.textContent = "-";
        longestLossCountEl.textContent = "-";
        longestWinIconsEl.innerHTML = "";
        longestLossIconsEl.innerHTML = "";

        if (winrateChart) {
          winrateChart.destroy();
          winrateChart = null;
        }
      }
    }

    searchBox.addEventListener("input", applyFilter);

    resetBtn.addEventListener("click", () => {
      searchBox.value = "";
      filteredRows = [...allRows];
      sortState = { col: MATCHES_INDEX, dir: "desc" };
      sortRows();
      renderHeader();
      renderTable();
    });

    loadSheet();
  </script>
</body>
</html>
