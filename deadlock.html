<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Most Played Heroes</title>
  <style>
    :root {
      --bg: #1f2430;
      --panel: #2a3140;
      --panel-2: #323a4a;
      --header: #252c39;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #b7ff2a;
      --border: #3a4353;
      --bar-bg: #434d5f;
      --matches-bar: #ff2a1a;
      --win-bar: #98e61d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrap {
      width: min(540px, calc(100vw - 48px));
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .titlebar {
      padding: 10px 12px 6px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #ffffff;
    }

    .titlebar .sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
      vertical-align: middle;
    }

    .topbar {
      padding: 10px 12px;
      background: #222834;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .topbar input {
      width: 100%;
      min-width: 0;
      max-width: 240px;
      background: #151a23;
      color: #fff;
      border: 1px solid #465062;
      padding: 7px 8px;
      font-size: 12px;
      outline: none;
    }

    .topbar button {
      flex: 0 0 auto;
      background: #151a23;
      color: #fff;
      border: 1px solid #465062;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .topbar button:hover {
      background: #1d2330;
    }

    .status {
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      background: #222834;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }


    thead th {
      background: var(--header);
      color: #ffffff;
      text-align: left;
      font-size: 12px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    thead th:hover {
      background: #2b3342;
    }

    tbody tr:nth-child(odd) {
      background: var(--panel);
    }

    tbody tr:nth-child(even) {
      background: var(--panel-2);
    }

    tbody td {
      padding: 3px 10px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
    }

    .hero-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .icon-slot {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      background: linear-gradient(135deg, #4b5563, #2f3745);
      border: 1px solid #596274;
      display: block;
      overflow: hidden;
    }

    .icon-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-meta {
      min-width: 0;
    }

    .hero-name {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.02;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero-date {
      color: #9fb0c7;
      font-size: 10px;
      margin-top: 1px;
      line-height: 1.02;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    .hero-date:hover {
      color: #c6d6ea;
      text-decoration: underline;
    }

    .stat-cell {
      min-width: 0;
    }

    .stat-value {
      color: #ffffff;
      font-size: 12px;
      line-height: 1;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .bar-wrap {
      width: 100%;
      height: 4px;
      background: var(--bar-bg);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
    }

    .bar-fill.matches {
      background: var(--matches-bar);
    }

    .bar-fill.win {
      background: var(--win-bar);
    }

    .totals-row td {
      color: var(--muted);
    }

    .sort-indicator {
      margin-left: 4px;
      color: #cbd5e1;
      font-size: 10px;
    }

    .empty {
      padding: 14px 12px;
      color: var(--muted);
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      MOST PLAYED HEROES<span class="sub">ALL TIME</span>
    </div>

    <div class="topbar">
      <input id="searchBox" type="search" placeholder="Filter heroes..." />
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <div id="status" class="status">Loading spreadsheet data...</div>

    <table id="dataTable" aria-label="Most played heroes">

      <thead></thead>
      <tbody></tbody>
    </table>

    <div id="emptyState" class="empty">No rows match the current filter.</div>
  </div>

  <script>
    const SHEET_ID = "1mygk8trLTWuWgNcHNXYKb_3ZmHgRjDRT5dk0fZ9mMc4";
    const GID = "0";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    const DATE_INDEX = 0;
    const HERO_NAME_INDEX = 1;
    const MATCHES_INDEX = 7;
    const WINRATE_INDEX = 6;

    const SORT_BY_DATE = "__date__";

    const table = document.getElementById("dataTable");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");
    const statusEl = document.getElementById("status");
    const searchBox = document.getElementById("searchBox");
    const resetBtn = document.getElementById("resetBtn");
    const emptyState = document.getElementById("emptyState");

    let allRows = [];
    let filteredRows = [];
    let sortState = { col: MATCHES_INDEX, dir: "desc" };
    let maxMatches = 0;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell);
            cell = "";
          } else if (ch === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else if (ch === "\r") {
          } else {
            cell += ch;
          }
        }
      }

      row.push(cell);
      rows.push(row);

      return rows.filter(r => !(r.length === 1 && r[0] === ""));
    }

    function normalizeValue(value) {
      if (value == null) return "";
      return String(value).trim();
    }

    function parseNumeric(value) {
      const v = normalizeValue(value).replace(/[$,%]/g, "").replace(/,/g, "");
      const num = Number(v);
      return Number.isNaN(num) ? null : num;
    }

    function parseSheetDate(value) {
      const v = normalizeValue(value);
      if (!v) return null;
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function formatExactDate(value) {
      const d = parseSheetDate(value);
      if (!d) return normalizeValue(value);
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "numeric",
        day: "numeric"
      });
    }

    function formatDaysAgo(value) {
      const d = parseSheetDate(value);
      if (!d) return normalizeValue(value);

      const today = startOfDay(new Date());
      const then = startOfDay(d);
      const diffMs = today - then;
      const days = Math.round(diffMs / 86400000);

      if (days <= 0) return "Today";
      if (days === 1) return "1 day ago";
      return `${days} days ago`;
    }

    function inferType(value) {
      const v = normalizeValue(value);
      if (v === "") return { type: "empty", value: "" };

      const num = parseNumeric(v);
      if (num !== null && /^[-+]?\d[\d,]*\.?\d*%?$/.test(v)) {
        return { type: "number", value: num };
      }

      const date = new Date(v);
      if (!Number.isNaN(date.getTime()) && /[A-Za-z]|\d{1,2}[/-]\d{1,2}[/-]\d{2,4}/.test(v)) {
        return { type: "date", value: date.getTime() };
      }

      return { type: "text", value: v.toLowerCase() };
    }

    function compareValues(a, b) {
      const av = inferType(a);
      const bv = inferType(b);

      const typeOrder = { empty: 0, number: 1, date: 2, text: 3 };
      if (av.type !== bv.type) {
        return typeOrder[av.type] - typeOrder[bv.type];
      }

      if (av.value < bv.value) return -1;
      if (av.value > bv.value) return 1;
      return 0;
    }

    function isTotalRow(row) {
      return normalizeValue(row[DATE_INDEX]) === "";
    }

    function getSortValue(row, columnIndex) {
      if (columnIndex === SORT_BY_DATE) {
        const d = parseSheetDate(row[DATE_INDEX]);
        return d ? d.toISOString() : "";
      }
      return row[columnIndex];
    }

    function sortRows() {
      filteredRows.sort((a, b) => {
        const result = compareValues(getSortValue(a, sortState.col), getSortValue(b, sortState.col));
        return sortState.dir === "asc" ? result : -result;
      });
    }

    function setSort(col, defaultDir = "desc") {
      if (sortState.col === col) {
        sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
      } else {
        sortState.col = col;
        sortState.dir = defaultDir;
      }
      sortRows();
      renderHeader();
      renderTable();
    }

    function renderHeroCell(row) {
      const wrapper = document.createElement("div");
      wrapper.className = "hero-cell";

      const icon = document.createElement("div");
      icon.className = "icon-slot";

      const heroName = normalizeValue(row[HERO_NAME_INDEX]).trim();
      const fileName = `${heroName.toLowerCase()}.png`;
      const filePath = `images/deadlock/icons/${encodeURIComponent(fileName)}`;

      const img = document.createElement("img");
      img.src = filePath;
      img.alt = heroName;
      img.loading = "lazy";

      img.onerror = function () {
        this.style.display = "none";
        icon.style.background = "linear-gradient(135deg, #4b5563, #2f3745)";
      };

      icon.appendChild(img);

      const meta = document.createElement("div");
      meta.className = "hero-meta";

      const name = document.createElement("div");
      name.className = "hero-name";
      name.textContent = heroName || "";

      const date = document.createElement("div");
      date.className = "hero-date";
      date.textContent = formatDaysAgo(row[DATE_INDEX]);
      date.title = formatExactDate(row[DATE_INDEX]);
      date.addEventListener("click", (e) => {
        e.stopPropagation();
        setSort(SORT_BY_DATE, "desc");
      });

      meta.appendChild(name);
      meta.appendChild(date);

      wrapper.appendChild(icon);
      wrapper.appendChild(meta);

      return wrapper;
    }

    function renderStatCell(valueText, pct, fillClass) {
      const wrapper = document.createElement("div");
      wrapper.className = "stat-cell";

      const value = document.createElement("div");
      value.className = "stat-value";
      value.textContent = valueText;

      const barWrap = document.createElement("div");
      barWrap.className = "bar-wrap";

      const bar = document.createElement("div");
      bar.className = `bar-fill ${fillClass}`;
      bar.style.width = `${Math.max(0, Math.min(100, pct))}%`;

      barWrap.appendChild(bar);
      wrapper.appendChild(value);
      wrapper.appendChild(barWrap);

      return wrapper;
    }

    function renderMatchesCell(row) {
      const matches = parseNumeric(row[MATCHES_INDEX]) ?? 0;
      const pct = maxMatches > 0 ? (matches / maxMatches) * 100 : 0;
      return renderStatCell(matches, pct, "matches");
    }

    function renderWinCell(row) {
      const winRaw = normalizeValue(row[WINRATE_INDEX]);
      const winPct = parseNumeric(winRaw) ?? 0;
      return renderStatCell(winRaw, winPct, "win");
    }

    function renderTable() {
      tbody.innerHTML = "";

      if (!filteredRows.length) {
        emptyState.style.display = "block";
      } else {
        emptyState.style.display = "none";
      }

      filteredRows.forEach((row) => {
        const tr = document.createElement("tr");

        if (isTotalRow(row)) {
          tr.classList.add("totals-row");
        }

        const heroTd = document.createElement("td");
        if (!isTotalRow(row)) {
          heroTd.appendChild(renderHeroCell(row));
        }
        tr.appendChild(heroTd);

        const matchesTd = document.createElement("td");
        if (!isTotalRow(row)) {
          matchesTd.appendChild(renderMatchesCell(row));
        }
        tr.appendChild(matchesTd);

        const winTd = document.createElement("td");
        if (!isTotalRow(row)) {
          winTd.appendChild(renderWinCell(row));
        }
        tr.appendChild(winTd);

        tbody.appendChild(tr);
      });

      statusEl.textContent = `${filteredRows.length} row(s) shown`;
    }

    function renderHeader() {
      thead.innerHTML = "";
      const tr = document.createElement("tr");

      const columns = [
        { label: "Hero", index: HERO_NAME_INDEX, defaultDir: "asc" },
        { label: "Matches", index: MATCHES_INDEX, defaultDir: "desc" },
        { label: "Win %", index: WINRATE_INDEX, defaultDir: "desc" }
      ];

      columns.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col.label;

        if (sortState.col === col.index) {
          const span = document.createElement("span");
          span.className = "sort-indicator";
          span.textContent = sortState.dir === "asc" ? "▲" : "▼";
          th.appendChild(span);
        }

        th.addEventListener("click", () => {
          setSort(col.index, col.defaultDir);
        });

        tr.appendChild(th);
      });

      thead.appendChild(tr);
    }

    function applyFilter() {
      const q = searchBox.value.trim().toLowerCase();

      filteredRows = !q
        ? [...allRows]
        : allRows.filter(row =>
            String(row[HERO_NAME_INDEX] ?? "").toLowerCase().includes(q) ||
            String(row[DATE_INDEX] ?? "").toLowerCase().includes(q)
          );

      sortRows();
      renderHeader();
      renderTable();
    }

    async function loadSheet() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const csvText = await res.text();
        const rows = parseCSV(csvText);

        if (!rows.length) {
          throw new Error("No data found.");
        }

        allRows = rows.slice(1).filter(r => r.some(cell => normalizeValue(cell) !== ""));

        maxMatches = Math.max(
          ...allRows.filter(row => !isTotalRow(row)).map(row => parseNumeric(row[MATCHES_INDEX]) ?? 0),
          0
        );

        filteredRows = [...allRows];
        sortRows();

        renderHeader();
        renderTable();
      } catch (err) {
        statusEl.innerHTML = `Could not load the Google Sheet automatically. Error: <strong>${err.message}</strong>`;
        thead.innerHTML = "";
        tbody.innerHTML = "";
        emptyState.style.display = "none";
      }
    }

    searchBox.addEventListener("input", applyFilter);

    resetBtn.addEventListener("click", () => {
      searchBox.value = "";
      filteredRows = [...allRows];
      sortState = { col: MATCHES_INDEX, dir: "desc" };
      sortRows();
      renderHeader();
      renderTable();
    });

    loadSheet();
  </script>
</body>
</html>
