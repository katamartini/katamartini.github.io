<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game List</title>
  <style>
    :root {
      --bg: #1f2430;
      --panel: #2a3140;
      --panel-2: #323a4a;
      --header: #252c39;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #b7ff2a;
      --border: #3a4353;
      --win: #98e61d;
      --loss: #ff7b72;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1400px, calc(100vw - 40px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .titlebar {
      padding: 10px 12px 6px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #ffffff;
    }

    .titlebar .sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
      vertical-align: middle;
    }

    .toolbar {
      padding: 10px 12px 12px;
      background: #222834;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: minmax(180px, 1.5fr) repeat(2, minmax(140px, 1fr)) auto;
      gap: 8px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      width: 100%;
      min-width: 0;
      background: #151a23;
      color: #fff;
      border: 1px solid #465062;
      padding: 8px 9px;
      font-size: 12px;
      outline: none;
    }

    .toolbar button {
      cursor: pointer;
      width: auto;
      min-width: 96px;
    }

    .toolbar button:hover {
      background: #1d2330;
    }

    .statusbar {
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      background: #222834;
      border-bottom: 1px solid var(--border);
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      background: var(--header);
      color: #ffffff;
      text-align: center;
      font-size: 12px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th:hover {
      background: #2b3342;
    }

    thead th.hero-col {
      text-align: left;
      min-width: 150px;
    }

    tbody tr:nth-child(odd) {
      background: var(--panel);
    }

    tbody tr:nth-child(even) {
      background: var(--panel-2);
    }

    tbody td {
      padding: 4px 8px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
      white-space: nowrap;
      text-align: center;
    }

    tbody td.hero-col {
      text-align: left;
      min-width: 150px;
    }

    .sort-indicator {
      margin-left: 4px;
      color: #cbd5e1;
      font-size: 10px;
    }

    .hero-cell {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
    }

    .icon-slot {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      background: linear-gradient(135deg, #4b5563, #2f3745);
      border: 1px solid #596274;
      overflow: hidden;
    }

    .icon-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hero-name {
      color: var(--accent);
      font-weight: 700;
      text-align: left;
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 3px 7px;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .result-pill.win {
      color: #eaffd0;
      background: rgba(152, 230, 29, 0.16);
      border-color: rgba(152, 230, 29, 0.35);
    }

    .result-pill.loss {
      color: #ffd8d3;
      background: rgba(255, 123, 114, 0.16);
      border-color: rgba(255, 123, 114, 0.35);
    }

    .result-pill.other {
      color: #d8dee9;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }

    .num {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      padding: 14px 12px;
      color: var(--muted);
      font-size: 12px;
      display: none;
    }

    @media (max-width: 1200px) {
      .page {
        width: calc(100vw - 24px);
      }

      body {
        padding: 12px;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="titlebar">
        GAMES<span class="sub">COUNTED MATCHES</span>
      </div>

      <div class="toolbar">
        <div class="field">
          <label for="searchBox">Search</label>
          <input id="searchBox" type="search" placeholder="Search hero or match id..." />
        </div>

        <div class="field">
          <label for="heroFilter">Hero</label>
          <select id="heroFilter">
            <option value="">All Heroes</option>
          </select>
        </div>

        <div class="field">
          <label for="resultFilter">Result</label>
          <select id="resultFilter">
            <option value="">All Results</option>
            <option value="win">Win</option>
            <option value="loss">Loss</option>
          </select>
        </div>

        <button id="resetBtn" type="button">Reset</button>
      </div>

      <div id="statusEl" class="statusbar">Loading matches...</div>

      <div class="table-wrap">
        <table id="gamesTable" aria-label="Games list">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty">No games match the current filters.</div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1mygk8trLTWuWgNcHNXYKb_3ZmHgRjDRT5dk0fZ9mMc4";
    const MATCHES_GID = "632247101";
    const MATCHES_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${MATCHES_GID}`;

    const MATCHES_HEADER_ALIASES = {
      matchId: ["match_id", "match id", "id"],
      date: ["match_date_est", "match date est", "match_date", "match date", "date"],
      startTime: ["match_start_time_est", "match start time est", "match_start_time", "match start time", "start time"],
      hero: ["selected_hero", "selected hero", "hero"],
      result: ["game_result", "game result", "result"],
      counts: ["counts_in_stats", "counts in stats", "counts"],
      souls: ["souls", "net_worth", "net worth"],
      kills: ["kills", "player_kills", "player kills"],
      deaths: ["deaths", "player_deaths", "player deaths"],
      assists: ["assists", "player_assists", "player assists"],
      damage: ["player_damage", "player damage", "damage"],
      objectiveDamage: ["objective_damage", "objective damage", "obj damage"],
      healing: ["healing", "healing_done", "healing done"],
      durationSeconds: ["duration_seconds", "duration seconds", "match_duration_seconds", "match duration seconds", "duration_secs", "duration secs", "duration_sec", "duration sec"]
    };

    const HERO_ICON_NAME_ALIASES = {
      "mo & krill": "mo+krill",
      "the doorman": "doorman"
    };

    const searchBox = document.getElementById("searchBox");
    const heroFilter = document.getElementById("heroFilter");
    const resultFilter = document.getElementById("resultFilter");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("statusEl");
    const emptyState = document.getElementById("emptyState");
    const table = document.getElementById("gamesTable");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    let headerIndexes = {};
    let allRows = [];
    let filteredRows = [];
    let sortState = { key: "dateTime", dir: "desc" };

    const columns = [
      { key: "date", label: "Date", defaultDir: "desc" },
      { key: "startTimeDisplay", label: "Start Time", defaultDir: "desc" },
      { key: "hero", label: "Hero", defaultDir: "asc", className: "hero-col" },
      { key: "result", label: "Result", defaultDir: "desc" },
      { key: "kills", label: "K", defaultDir: "desc" },
      { key: "deaths", label: "D", defaultDir: "desc" },
      { key: "assists", label: "A", defaultDir: "desc" },
      { key: "souls", label: "Souls", defaultDir: "desc" },
      { key: "damage", label: "Player Dmg", defaultDir: "desc" },
      { key: "objectiveDamage", label: "Obj Dmg", defaultDir: "desc" },
      { key: "healing", label: "Healing", defaultDir: "desc" },
      { key: "durationSeconds", label: "Length", defaultDir: "desc" },
      { key: "matchId", label: "Match ID", defaultDir: "desc" }
    ];

    function normalizeValue(value) {
      if (value == null) return "";
      return String(value).trim();
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell);
            cell = "";
          } else if (ch === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else if (ch === "\r") {
          } else {
            cell += ch;
          }
        }

      }

      row.push(cell);
      rows.push(row);
      return rows.filter(r => !(r.length === 1 && r[0] === ""));
    }

    function normalizeHeaderName(value) {
      return normalizeValue(value)
        .toLowerCase()
        .replace(/[-_\s]+/g, " ")
        .replace(/[^a-z0-9 ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function findHeaderIndex(headerRow, aliases, fallbackIndex = -1) {
      const normalizedHeaders = headerRow.map(normalizeHeaderName);
      const normalizedAliases = aliases.map(normalizeHeaderName);

      for (const alias of normalizedAliases) {
        const idx = normalizedHeaders.indexOf(alias);
        if (idx !== -1) return idx;
      }

      for (const alias of normalizedAliases) {
        const tokens = alias.split(" ").filter(Boolean);
        const idx = normalizedHeaders.findIndex(header =>
          tokens.every(token => header.includes(token))
        );
        if (idx !== -1) return idx;
      }

      return fallbackIndex;
    }

    function parseNumeric(value) {
      const v = normalizeValue(value).replace(/[$,%]/g, "").replace(/,/g, "");
      const num = Number(v);
      return Number.isNaN(num) ? null : num;
    }

    function parseSheetDate(value) {
      const v = normalizeValue(value);
      if (!v) return null;

      let m = v.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2,4})$/);
      if (m) {
        let year = Number(m[3]);
        if (year < 100) year += 2000;
        const d = new Date(year, Number(m[1]) - 1, Number(m[2]));
        return Number.isNaN(d.getTime()) ? null : d;
      }

      m = v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[ T](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
      if (m) {
        const d = new Date(
          Number(m[1]),
          Number(m[2]) - 1,
          Number(m[3]),
          Number(m[4] || 0),
          Number(m[5] || 0),
          Number(m[6] || 0)
        );
        return Number.isNaN(d.getTime()) ? null : d;
      }

      return null;
    }

    function parseTimeOnly(value) {
      const v = normalizeValue(value);
      if (!v) return null;

      let m = v.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)$/i);
      if (m) {
        let hours = Number(m[1]);
        const minutes = Number(m[2]);
        const seconds = Number(m[3] || 0);
        const meridiem = m[4].toUpperCase();

        if (meridiem === "AM" && hours === 12) hours = 0;
        if (meridiem === "PM" && hours !== 12) hours += 12;

        return { hours, minutes, seconds };
      }

      m = v.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (m) {
        return {
          hours: Number(m[1]),
          minutes: Number(m[2]),
          seconds: Number(m[3] || 0)
        };
      }

      return null;
    }

    function parseDurationToSeconds(value) {
      const raw = normalizeValue(value);
      if (!raw) return null;

      const numeric = parseNumeric(raw);
      if (numeric !== null && numeric > 0) return numeric;

      const hhmmss = raw.match(/^(\d{1,3}):(\d{1,2}):(\d{1,2})$/);
      if (hhmmss) {
        return Number(hhmmss[1]) * 3600 + Number(hhmmss[2]) * 60 + Number(hhmmss[3]);
      }

      const mmss = raw.match(/^(\d{1,3}):(\d{1,2})$/);
      if (mmss) {
        return Number(mmss[1]) * 60 + Number(mmss[2]);
      }

      return null;
    }

    function formatDuration(seconds) {
      const total = Number(seconds);
      if (!Number.isFinite(total) || total <= 0) return "-";

      const rounded = Math.round(total);
      const hours = Math.floor(rounded / 3600);
      const minutes = Math.floor((rounded % 3600) / 60);
      const secs = rounded % 60;

      if (hours > 0) {
        return `${hours}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }
      return `${minutes}:${String(secs).padStart(2, "0")}`;
    }

    function formatDate(value) {
      const d = value instanceof Date ? value : parseSheetDate(value);
      if (!d) return normalizeValue(value);
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatTimeFromParts(parts) {
      if (!parts) return "-";
      const temp = new Date(2000, 0, 1, parts.hours, parts.minutes, parts.seconds || 0);
      return temp.toLocaleTimeString(undefined, {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function heroIconPath(heroName) {
      const normalized = normalizeValue(heroName).toLowerCase();
      const fileBaseName = HERO_ICON_NAME_ALIASES[normalized] || normalized;
      return `images/deadlock/icons/${encodeURIComponent(fileBaseName + ".png")}`;
    }

    function buildIcon(heroName, className = "icon-slot") {
      const slot = document.createElement("div");
      slot.className = className;

      const img = document.createElement("img");
      img.src = heroIconPath(heroName);
      img.alt = heroName;
      img.loading = "lazy";
      img.onerror = function () {
        this.style.display = "none";
      };

      slot.appendChild(img);
      return slot;
    }

    function resolveIndexes(rows) {
      const headerRow = rows[0] || [];
      headerIndexes = {
        matchId: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.matchId),
        date: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.date),
        startTime: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.startTime),
        hero: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.hero),
        result: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.result),
        counts: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.counts),
        souls: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.souls),
        kills: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.kills),
        deaths: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.deaths),
        assists: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.assists),
        damage: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.damage),
        objectiveDamage: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.objectiveDamage),
        healing: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.healing),
        durationSeconds: findHeaderIndex(headerRow, MATCHES_HEADER_ALIASES.durationSeconds)
      };
    }

    function cell(row, key) {
      const idx = headerIndexes[key];
      if (!Number.isInteger(idx) || idx < 0) return "";
      return normalizeValue(row[idx]);
    }

    function buildMatchObjects(rows) {
      return rows.slice(1)
        .filter(r => r.some(c => normalizeValue(c) !== ""))
        .map(row => {
          const startTimeRaw = cell(row, "startTime");
          const dateRaw = cell(row, "date");
          const dateObj = parseSheetDate(dateRaw);
          const startTimeDateObj = parseSheetDate(startTimeRaw);
          const startTimeParts = parseTimeOnly(startTimeRaw);

          let dateTime = null;
          if (startTimeDateObj) {
            dateTime = startTimeDateObj;
          } else if (dateObj && startTimeParts) {
            dateTime = new Date(
              dateObj.getFullYear(),
              dateObj.getMonth(),
              dateObj.getDate(),
              startTimeParts.hours,
              startTimeParts.minutes,
              startTimeParts.seconds || 0
            );
          } else if (dateObj) {
            dateTime = dateObj;
          }

          const durationSeconds = parseDurationToSeconds(cell(row, "durationSeconds"));

          return {
            raw: row,
            matchId: cell(row, "matchId"),
            date: dateRaw,
            dateObj,
            startTimeRaw,
            startTimeParts,
            startTimeDisplay: startTimeParts
              ? formatTimeFromParts(startTimeParts)
              : (startTimeDateObj
                  ? startTimeDateObj.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })
                  : normalizeValue(startTimeRaw) || "-"),
            dateTime,
            hero: cell(row, "hero"),
            result: cell(row, "result").toLowerCase(),
            counts: cell(row, "counts").toLowerCase(),
            kills: parseNumeric(cell(row, "kills")),
            deaths: parseNumeric(cell(row, "deaths")),
            assists: parseNumeric(cell(row, "assists")),
            souls: parseNumeric(cell(row, "souls")),
            damage: parseNumeric(cell(row, "damage")),
            objectiveDamage: parseNumeric(cell(row, "objectiveDamage")),
            healing: parseNumeric(cell(row, "healing")),
            durationSeconds
          };
        })
        .filter(row => row.counts === "yes");
    }

    function populateFilters() {
      const heroes = [...new Set(allRows.map(r => r.hero).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      heroFilter.innerHTML = `<option value="">All Heroes</option>` +
        heroes.map(hero => `<option value="${escapeHtml(hero)}">${escapeHtml(hero)}</option>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getSortValue(row, key) {
      if (key === "date") return row.dateObj ? row.dateObj.getTime() : -Infinity;
      if (key === "startTimeDisplay") {
        if (row.startTimeParts) {
          return row.startTimeParts.hours * 3600 + row.startTimeParts.minutes * 60 + (row.startTimeParts.seconds || 0);
        }
        return row.dateTime ? row.dateTime.getTime() : -Infinity;
      }
      if (key === "dateTime") return row.dateTime ? row.dateTime.getTime() : -Infinity;
      return row[key];
    }

    function compareValues(a, b) {
      if (a == null && b == null) return 0;
      if (a == null) return -1;
      if (b == null) return 1;

      if (typeof a === "number" && typeof b === "number") return a - b;

      const aStr = String(a).toLowerCase();
      const bStr = String(b).toLowerCase();
      if (aStr < bStr) return -1;
      if (aStr > bStr) return 1;
      return 0;
    }

    function sortRows() {
      filteredRows.sort((a, b) => {
        const result = compareValues(getSortValue(a, sortState.key), getSortValue(b, sortState.key));
        return sortState.dir === "asc" ? result : -result;
      });
    }

    function setSort(key, defaultDir = "desc") {
      if (sortState.key === key) {
        sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
      } else {
        sortState.key = key;
        sortState.dir = defaultDir;
      }
      sortRows();
      renderHeader();
      renderTable();
    }

    function applyFilters() {
      const search = searchBox.value.trim().toLowerCase();
      const hero = heroFilter.value;
      const result = resultFilter.value;

      filteredRows = allRows.filter(row => {
        if (hero && row.hero !== hero) return false;
        if (result && row.result !== result) return false;

        if (search) {
          const haystack = [
            row.matchId,
            row.hero,
            row.result,
            row.date,
            row.startTimeRaw,
            row.startTimeDisplay
          ].join(" ").toLowerCase();

          if (!haystack.includes(search)) return false;
        }

        return true;
      });

      sortRows();
      renderHeader();
      renderTable();
    }

    function renderHeader() {
      thead.innerHTML = "";
      const tr = document.createElement("tr");

      columns.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col.label;
        if (col.className) th.classList.add(col.className);

        if (sortState.key === col.key) {
          const span = document.createElement("span");
          span.className = "sort-indicator";
          span.textContent = sortState.dir === "asc" ? "▲" : "▼";
          th.appendChild(span);
        }

        th.addEventListener("click", () => setSort(col.key, col.defaultDir));
        tr.appendChild(th);
      });

      thead.appendChild(tr);
    }

    function resultPill(result) {
      const cls = result === "win" ? "win" : result === "loss" ? "loss" : "other";
      const label = result ? result[0].toUpperCase() + result.slice(1) : "-";
      return `<span class="result-pill ${cls}">${escapeHtml(label)}</span>`;
    }

    function formatNumber(value) {
      return Number.isFinite(value) ? value.toLocaleString() : "-";
    }

    function renderTable() {
      tbody.innerHTML = "";
      emptyState.style.display = filteredRows.length ? "none" : "block";

      filteredRows.forEach(row => {
        const tr = document.createElement("tr");

        const dateTd = document.createElement("td");
        dateTd.textContent = formatDate(row.dateObj || row.date);
        tr.appendChild(dateTd);

        const timeTd = document.createElement("td");
        timeTd.textContent = row.startTimeDisplay || "-";
        tr.appendChild(timeTd);

        const heroTd = document.createElement("td");
        heroTd.className = "hero-col";
        const heroWrap = document.createElement("div");
        heroWrap.className = "hero-cell";
        heroWrap.appendChild(buildIcon(row.hero));
        const heroName = document.createElement("div");
        heroName.className = "hero-name";
        heroName.textContent = row.hero || "-";
        heroWrap.appendChild(heroName);
        heroTd.appendChild(heroWrap);
        tr.appendChild(heroTd);

        const resultTd = document.createElement("td");
        resultTd.innerHTML = resultPill(row.result);
        tr.appendChild(resultTd);

        ["kills","deaths","assists","souls","damage","objectiveDamage","healing","durationSeconds"].forEach(key => {
          const td = document.createElement("td");
          td.className = "num";
          td.textContent = key === "durationSeconds" ? formatDuration(row.durationSeconds) : formatNumber(row[key]);
          tr.appendChild(td);
        });

        const matchIdTd = document.createElement("td");
        matchIdTd.textContent = row.matchId || "-";
        tr.appendChild(matchIdTd);

        tbody.appendChild(tr);
      });

      statusEl.textContent = `${filteredRows.length} counted game(s) shown`;
    }

    async function loadData() {
      try {
        const res = await fetch(MATCHES_CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        const rows = parseCSV(text);
        if (!rows.length) throw new Error("No rows found");

        resolveIndexes(rows);
        allRows = buildMatchObjects(rows);

        populateFilters();
        applyFilters();
      } catch (err) {
        statusEl.innerHTML = `Could not load match data. Error: <strong>${escapeHtml(err.message)}</strong>`;
        thead.innerHTML = "";
        tbody.innerHTML = "";
      }
    }

    searchBox.addEventListener("input", applyFilters);
    heroFilter.addEventListener("change", applyFilters);
    resultFilter.addEventListener("change", applyFilters);

    resetBtn.addEventListener("click", () => {
      searchBox.value = "";
      heroFilter.value = "";
      resultFilter.value = "";
      sortState = { key: "dateTime", dir: "desc" };
      applyFilters();
    });

    loadData();
  </script>
</body>
</html>
